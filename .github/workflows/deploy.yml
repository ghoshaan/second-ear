name: rebuild-and-deploy

on:
  workflow_dispatch:
  repository_dispatch:
    types: [drive-updated]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # -----------------------------------------------------------------------
      # Export fresh snapshots from Labelbox → save to ndjson/ → commit.
      # Skipped if LABELBOX_PROJECTS is not set.
      # -----------------------------------------------------------------------
      - name: Export from Labelbox
        env:
          LABELBOX_API_KEY: ${{ secrets.LABELBOX_API_KEY }}
          LABELBOX_PROJECTS: ${{ secrets.LABELBOX_PROJECTS }}
          NDJSON_DIR: ndjson
        run: |
          set -euo pipefail
          if [ -z "${LABELBOX_PROJECTS:-}" ] || [ -z "${LABELBOX_API_KEY:-}" ]; then
            echo "→ LABELBOX_API_KEY or LABELBOX_PROJECTS not set — skipping Labelbox export"
            exit 0
          fi
          pip install labelbox --quiet
          python3 scripts/lb_export.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ndjson/
          if git diff --staged --quiet; then
            echo "→ No new snapshots to commit"
          else
            git commit -m "chore: add Labelbox snapshot $(date -u +%Y-%m-%d-%H) [skip ci]"
            git push
          fi

      # -----------------------------------------------------------------------
      # Download NDJSON from Google Drive. Skipped if DRIVE_NDJSON_IDS not set.
      # -----------------------------------------------------------------------
      - name: Prepare Cache Key
        id: cache-key
        env:
          DRIVE_NDJSON_IDS: ${{ secrets.DRIVE_NDJSON_IDS }}
        run: |
          echo "ids_hash=$(echo -n "$DRIVE_NDJSON_IDS" | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache NDJSON files
        uses: actions/cache@v4
        with:
          path: ndjson
          key: ${{ runner.os }}-ndjson-${{ hashFiles('scripts/drive_download.py') }}-${{ steps.cache-key.outputs.ids_hash }}
          restore-keys: |
            ${{ runner.os }}-ndjson-

      - name: Download NDJSON from Google Drive
        env:
          DRIVE_NDJSON_IDS: ${{ secrets.DRIVE_NDJSON_IDS }}
        run: |
          set -euo pipefail
          if [ -z "${DRIVE_NDJSON_IDS:-}" ]; then
            echo "→ DRIVE_NDJSON_IDS not set — skipping Drive download"
            exit 0
          fi
          python3 scripts/drive_download.py ndjson
          echo "→ NDJSON files in ndjson/ after Drive download:"
          ls -lh ndjson/*.ndjson 2>/dev/null || echo "  (none)"

      # -----------------------------------------------------------------------
      # Build encrypted search index, then commit encrypted outputs back to
      # git so UI-only deploys always have the latest data without rebuilding.
      # -----------------------------------------------------------------------
      - name: Build encrypted search index
        env:
          SEARCH_PASSWORD: ${{ secrets.SEARCH_PASSWORD }}
        run: bash scripts/build.sh

      - name: Commit updated encrypted data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.enc public/index.enc public/meta.json
          if git diff --staged --quiet; then
            echo "→ No changes to encrypted data"
          else
            git commit -m "chore: update encrypted search index $(date -u +%Y-%m-%d-%H) [skip ci]"
            git push
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

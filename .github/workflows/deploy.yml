name: build-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [drive-updated]
  schedule:
    - cron: '0 * * * *'   # every hour at :00 UTC

permissions:
  contents: write   # needed to commit new NDJSON snapshots back to ndjson/
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip scheduled runs until Labelbox is configured — no point rebuilding
    # the same static snapshots every hour.
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # -----------------------------------------------------------------------
      # Export fresh snapshots from Labelbox → save to ndjson/ → commit.
      # Each snapshot is a dated file; existing files are never overwritten, so
      # the full history accumulates automatically.
      # Skipped if LABELBOX_PROJECTS is not set.
      # -----------------------------------------------------------------------
      - name: Export from Labelbox
        env:
          LABELBOX_API_KEY: ${{ secrets.LABELBOX_API_KEY }}
          LABELBOX_PROJECTS: ${{ secrets.LABELBOX_PROJECTS }}
          NDJSON_DIR: ndjson
        run: |
          set -euo pipefail
          if [ -z "${LABELBOX_PROJECTS:-}" ]; then
            echo "→ LABELBOX_PROJECTS not set — skipping Labelbox export"
            exit 0
          fi
          pip install labelbox --quiet
          python3 scripts/lb_export.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ndjson/
          if git diff --staged --quiet; then
            echo "→ No new snapshots to commit"
          else
            git commit -m "chore: add Labelbox snapshot $(date -u +%Y-%m-%d-%H) [skip ci]"
            git push
          fi

      # -----------------------------------------------------------------------
      # Build from every snapshot in ndjson/.
      # Convention files (batch-{BATCH}-{DATE}.ndjson) are picked up
      # automatically. Arbitrary-named files need an entry in manifest.json.
      # -----------------------------------------------------------------------
      - name: Build encrypted search index
        env:
          SEARCH_PASSWORD: ${{ secrets.SEARCH_PASSWORD }}
        run: |
          set -euo pipefail
          BUILD_ARGS=$(python3 scripts/build_args.py)
          echo "→ Sources: $BUILD_ARGS"
          npm run build -- $BUILD_ARGS

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

name: build-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [drive-updated]
  schedule:
    - cron: '0 * * * *'   # every hour at :00 UTC

permissions:
  contents: write   # needed to commit new NDJSON snapshots back to ndjson/
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip scheduled runs until Labelbox is configured — no point rebuilding
    # the same static snapshots every hour.
    if: github.event_name != 'schedule' || secrets.LABELBOX_PROJECTS != ''
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # -----------------------------------------------------------------------
      # Export fresh snapshots from Labelbox → save to ndjson/ → commit.
      # Each snapshot is a dated file; existing files are never overwritten, so
      # the full history accumulates automatically.
      # Skipped if LABELBOX_PROJECTS is not set.
      # -----------------------------------------------------------------------
      - name: Export from Labelbox
        env:
          LABELBOX_API_KEY: ${{ secrets.LABELBOX_API_KEY }}
          LABELBOX_PROJECTS: ${{ secrets.LABELBOX_PROJECTS }}
          NDJSON_DIR: ndjson
        run: |
          set -euo pipefail
          if [ -z "${LABELBOX_PROJECTS:-}" ]; then
            echo "→ LABELBOX_PROJECTS not set — skipping Labelbox export"
            exit 0
          fi
          pip install labelbox --quiet
          python3 scripts/lb_export.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ndjson/
          if git diff --staged --quiet; then
            echo "→ No new snapshots to commit"
          else
            git commit -m "chore: add Labelbox snapshot $(date -u +%Y-%m-%d-%H) [skip ci]"
            git push
          fi

      # -----------------------------------------------------------------------
      # Build from every file in ndjson/.
      # Naming convention: batch-{BATCH}-{YYYY-MM-DD[-HH]}.ndjson
      # All snapshots are included every build so version history accumulates.
      # -----------------------------------------------------------------------
      - name: Build encrypted search index
        env:
          SEARCH_PASSWORD: ${{ secrets.SEARCH_PASSWORD }}
        run: |
          set -euo pipefail
          BUILD_ARGS=""
          for f in ndjson/batch-*.ndjson; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .ndjson)
            rest="${name#batch-}"
            date=$(echo "$rest" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}(-[0-9]{2})?$' || true)
            if [ -n "$date" ]; then
              batch="${rest%-${date}}"
            else
              batch="$rest"
            fi
            BUILD_ARGS="$BUILD_ARGS $f:$batch${date:+:$date}"
          done
          if [ -z "$BUILD_ARGS" ]; then
            echo "✗ No NDJSON files found in ndjson/ — commit at least one snapshot to get started"
            exit 1
          fi
          echo "→ Building from:$BUILD_ARGS"
          npm run build -- $BUILD_ARGS

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

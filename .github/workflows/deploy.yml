name: build-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [drive-updated]
  schedule:
    - cron: '0 * * * *'   # every hour at :00 UTC

permissions:
  contents: write   # needed to commit new NDJSON snapshots back to ndjson/
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip scheduled runs until Labelbox is configured — no point rebuilding
    # the same static snapshots every hour.
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # -----------------------------------------------------------------------
      # Export fresh snapshots from Labelbox → save to ndjson/ → commit.
      # Each snapshot is a dated file; existing files are never overwritten, so
      # the full history accumulates automatically.
      # Skipped if LABELBOX_PROJECTS is not set.
      # -----------------------------------------------------------------------
      - name: Export from Labelbox
        env:
          LABELBOX_API_KEY: ${{ secrets.LABELBOX_API_KEY }}
          LABELBOX_PROJECTS: ${{ secrets.LABELBOX_PROJECTS }}
          NDJSON_DIR: ndjson
        run: |
          set -euo pipefail
          if [ -z "${LABELBOX_PROJECTS:-}" ] || [ -z "${LABELBOX_API_KEY:-}" ]; then
            echo "→ LABELBOX_API_KEY or LABELBOX_PROJECTS not set — skipping Labelbox export"
            exit 0
          fi
          pip install labelbox --quiet
          python3 scripts/lb_export.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ndjson/
          if git diff --staged --quiet; then
            echo "→ No new snapshots to commit"
          else
            git commit -m "chore: add Labelbox snapshot $(date -u +%Y-%m-%d-%H) [skip ci]"
            git push
          fi

      # -----------------------------------------------------------------------
      # Download additional NDJSON snapshots from Google Drive.
      # DRIVE_NDJSON_IDS is a comma-separated list of Drive file IDs. Each
      # file must be shared as "anyone with the link". The original Drive
      # filename is preserved so existing manifest.json glob patterns match.
      # Skipped if DRIVE_NDJSON_IDS is not set.
      # -----------------------------------------------------------------------
      - name: Download NDJSON from Google Drive
        env:
          DRIVE_NDJSON_IDS: ${{ secrets.DRIVE_NDJSON_IDS }}
        run: |
          set -euo pipefail
          if [ -z "${DRIVE_NDJSON_IDS:-}" ]; then
            echo "→ DRIVE_NDJSON_IDS not set — skipping Drive download"
            exit 0
          fi
          python3 scripts/drive_download.py ndjson
          echo "→ NDJSON files in ndjson/ after Drive download:"
          ls -lh ndjson/*.ndjson 2>/dev/null || echo "  (none)"

      # -----------------------------------------------------------------------
      # Build from every snapshot in ndjson/.
      # Convention files (batch-{BATCH}-{DATE}.ndjson) are picked up
      # automatically. Arbitrary-named files need an entry in manifest.json.
      # -----------------------------------------------------------------------
      - name: Build encrypted search index
        env:
          SEARCH_PASSWORD: ${{ secrets.SEARCH_PASSWORD }}
        run: bash scripts/build.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
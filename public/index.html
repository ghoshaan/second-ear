<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>ATC Transcript Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Fraunces:opsz,wght@9..144,300;9..144,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0b0e0c;
    --panel:     #141a17;
    --line:      #1f2a23;
    --line-2:    #2a3a30;
    --ink:       #d6e3da;
    --ink-dim:   #7a8a80;
    --ink-faint: #4b574f;
    --amber:     #ffb347;
    --red:       #e57373;
    --pilot:     #6fcf97;
    --atc:       #ffb347;
    --hl-bg:     #3d2a07;
    --hl-fg:     #ffd084;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13px;
    line-height: 1.55;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at top, rgba(255,179,71,0.04), transparent 60%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
  }

  /* Lock screen */
  .lock { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .lock-card { width: 100%; max-width: 420px; border: 1px solid var(--line-2); background: var(--panel); padding: 36px 32px; }
  .lock-glyph { font-family: 'Fraunces', serif; font-style: italic; font-size: 56px; color: var(--amber); line-height: 1; margin-bottom: 18px; }
  .lock-title { font-family: 'Fraunces', serif; font-weight: 300; font-size: 22px; margin: 0 0 6px; }
  .lock-title em { font-style: italic; color: var(--amber); font-weight: 600; }
  .lock-sub { color: var(--ink-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 24px; }
  .lock-form { display: flex; flex-direction: column; gap: 10px; }
  .lock-form input { background: var(--bg); border: 1px solid var(--line-2); color: var(--ink); font-family: inherit; font-size: 14px; padding: 12px 14px; outline: none; border-radius: 0; }
  .lock-form input:focus { border-color: var(--amber); box-shadow: 0 0 0 1px var(--amber); }
  .lock-form button { background: var(--amber); color: var(--bg); border: 1px solid var(--amber); font-family: inherit; font-size: 12px; text-transform: uppercase; letter-spacing: 0.16em; padding: 12px; cursor: pointer; font-weight: 700; }
  .lock-form button:disabled { opacity: 0.5; cursor: progress; }
  .lock-error { color: var(--red); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; min-height: 14px; margin-top: 4px; }
  .lock-foot { color: var(--ink-faint); font-size: 10px; text-transform: uppercase; letter-spacing: 0.16em; margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--line); }

  /* App */
  .app { display: none; }
  .app.unlocked { display: block; }
  header { border-bottom: 1px solid var(--line); padding: 28px 32px 22px; display: flex; align-items: baseline; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  h1 { font-family: 'Fraunces', serif; font-weight: 300; font-size: 28px; margin: 0; letter-spacing: -0.01em; }
  h1 em { font-style: italic; color: var(--amber); font-weight: 600; }
  .meta { display: flex; gap: 24px; font-size: 11px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.12em; align-items: center; }
  .meta b { color: var(--ink); font-weight: 500; letter-spacing: 0; text-transform: none; }
  .lock-out { color: var(--ink-faint); background: transparent; border: 1px solid var(--line-2); font-family: inherit; font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; padding: 4px 10px; cursor: pointer; }
  .lock-out:hover { color: var(--amber); border-color: var(--amber); }

  .search-wrap { padding: 24px 32px 12px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .search-row { display: flex; gap: 12px; align-items: center; }
  .search-input { flex: 1; background: var(--panel); border: 1px solid var(--line-2); color: var(--ink); font-family: inherit; font-size: 15px; padding: 12px 16px; outline: none; border-radius: 0; transition: border-color 0.15s; }
  .search-input::placeholder { color: var(--ink-faint); }
  .search-input:focus { border-color: var(--amber); box-shadow: 0 0 0 1px var(--amber); }

  .pill { border: 1px solid var(--line-2); color: var(--ink-dim); padding: 6px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; cursor: pointer; user-select: none; background: transparent; font-family: inherit; transition: all 0.15s; }
  .pill:hover { color: var(--ink); border-color: var(--ink-dim); }
  .pill.active { color: var(--bg); background: var(--amber); border-color: var(--amber); }

  .filters { display: flex; gap: 14px; margin-top: 14px; align-items: center; flex-wrap: wrap; }
  .filters .group { display: flex; gap: 8px; align-items: center; }
  .filters .sep { color: var(--ink-faint); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; }

  .facet-select, .facet-input {
    background: var(--panel); color: var(--ink); border: 1px solid var(--line-2);
    font-family: inherit; font-size: 12px; padding: 6px 10px;
    border-radius: 0; cursor: pointer; min-width: 110px;
  }
  .facet-input { cursor: text; }
  .facet-input.annotator { min-width: 200px; } /* longer values */
  .facet-select:focus, .facet-input:focus { outline: none; border-color: var(--amber); }
  .facet-clear { background: transparent; border: none; color: var(--ink-faint); font-size: 14px; padding: 0 4px; cursor: pointer; font-family: inherit; }
  .facet-clear:hover { color: var(--amber); }

  .status { padding: 10px 32px; font-size: 11px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.14em; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; gap: 12px; }
  .status .blink::after { content: '_'; animation: blink 1.1s steps(2) infinite; color: var(--amber); }
  @keyframes blink { 50% { opacity: 0; } }

  main { padding: 8px 0 80px; }
  .result { border-bottom: 1px solid var(--line); padding: 18px 32px; transition: background 0.1s; }
  .result:hover { background: rgba(255,179,71,0.025); }
  .result-head { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; margin-bottom: 10px; flex-wrap: wrap; }
  .result-key { color: var(--ink); font-size: 13px; font-weight: 500; word-break: break-all; }
  a.result-key { text-decoration: none; }
  a.result-key:hover { color: var(--amber); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; }
  .result-tags { display: flex; gap: 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-faint); align-items: center; flex-wrap: wrap; }
  .tag { padding: 2px 8px; border: 1px solid var(--line-2); }
  .tag-role.pilot { color: var(--pilot); border-color: rgba(111,207,151,0.3); }
  .tag-role.atc   { color: var(--atc); border-color: rgba(255,179,71,0.3); }
  .tag-facet { color: var(--ink-dim); }
  .tag-batch { color: var(--amber); border-color: rgba(255,179,71,0.4); }
  .tag-dur { color: var(--ink-dim); border: none; padding-left: 4px; }
  .tag-reviewed { color: var(--pilot); border-color: rgba(111,207,151,0.4); cursor: help; }
  .tag-unreviewed { color: var(--ink-faint); border-color: var(--line-2); }
  .segments { display: grid; gap: 4px; margin-top: 8px; }
  .seg { display: grid; grid-template-columns: 56px 48px 1fr; gap: 12px; align-items: baseline; padding: 4px 0; }
  .seg-time { color: var(--ink-faint); font-size: 11px; font-variant-numeric: tabular-nums; }
  .seg-role { font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; }
  .seg-role.pilot { color: var(--pilot); }
  .seg-role.atc { color: var(--atc); }
  .seg-role.unknown { color: var(--ink-faint); }
  .seg-text { color: var(--ink); }
  .seg-text mark, .result-key mark { background: var(--hl-bg); color: var(--hl-fg); padding: 0 2px; border-radius: 1px; }

  .annotator-line { font-size: 10px; color: var(--ink-faint); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.12em; }
  .annotator-line b { color: var(--ink-dim); font-weight: 400; text-transform: none; letter-spacing: 0; }

  .version-badge { font-size: 10px; color: var(--ink-dim); cursor: pointer; border: 1px solid var(--line-2); padding: 2px 7px; user-select: none; transition: color 0.15s, border-color 0.15s; background: transparent; font-family: inherit; }
  .version-badge:hover { color: var(--amber); border-color: rgba(255,179,71,0.4); }
  .version-badge.open { color: var(--amber); border-color: rgba(255,179,71,0.4); }
  .history-panel { display: none; margin-top: 10px; border-left: 2px solid var(--line-2); padding-left: 14px; }
  .history-panel.open { display: block; }
  .version-block { padding: 6px 0 8px; }
  .version-block + .version-block { border-top: 1px solid var(--line-2); padding-top: 10px; margin-top: 2px; }
  .version-block-header { display: flex; gap: 10px; align-items: baseline; font-size: 11px; margin-bottom: 5px; }
  .version-block-date { color: var(--ink-faint); font-variant-numeric: tabular-nums; min-width: 100px; }
  .version-block-glyph { color: var(--amber); min-width: 16px; text-align: center; }
  .version-block-desc { color: var(--ink-dim); }
  .version-block.current .version-block-date { color: var(--amber); }
  .version-block.current .version-block-desc { color: var(--ink); }
  .version-block.prior { background: rgba(229,115,115,0.05); padding: 8px 10px; border-radius: 2px; margin: 4px -4px; }
  mark.diff-del { background: rgba(229,115,115,0.3); color: var(--red); border-radius: 1px; padding: 0; font-style: normal; }

  .empty { padding: 80px 32px; text-align: center; color: var(--ink-faint); }
  .empty .glyph { font-family: 'Fraunces', serif; font-size: 64px; font-style: italic; color: var(--line-2); margin-bottom: 12px; }

  footer { border-top: 1px solid var(--line); padding: 16px 32px; font-size: 10px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.16em; text-align: center; }

  @media (max-width: 640px) {
    header, .search-wrap, .status, .result, footer { padding-left: 16px; padding-right: 16px; }
    .seg { grid-template-columns: 48px 40px 1fr; gap: 8px; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="lock" id="lock">
  <div class="lock-card">
    <div class="lock-glyph">⌖</div>
    <h1 class="lock-title">ATC <em>Transcript</em> Search</h1>
    <div class="lock-sub">restricted · enter passphrase</div>
    <form class="lock-form" id="lock-form">
      <input id="pw" type="password" placeholder="passphrase" autocomplete="current-password" autofocus>
      <button id="pw-go" type="submit">unlock</button>
      <div class="lock-error" id="lock-err"></div>
    </form>
    <div class="lock-foot">aes-256-gcm · pbkdf2-sha256</div>
  </div>
</div>

<div class="app" id="app">
  <header>
    <h1>ATC <em>Transcript</em> Search</h1>
    <div class="meta">
      <span><b id="m-docs">—</b> recordings</span>
      <span><b id="m-hours">—</b> hours</span>
      <button class="lock-out" id="btn-lock">lock</button>
    </div>
  </header>

  <div class="search-wrap">
    <div class="search-row">
      <input id="q" class="search-input" type="search" autocomplete="off"
             placeholder="search transcripts… try “qantas thirty four” or “flight level one eight zero”">
    </div>
    <div class="filters">
      <div class="group">
        <span class="sep">role</span>
        <button class="pill active" data-filter="all">all</button>
        <button class="pill" data-filter="pilot">pilot</button>
        <button class="pill" data-filter="atc">atc</button>
      </div>
      <div class="group">
        <span class="sep">review</span>
        <button class="pill active" data-review="all">all</button>
        <button class="pill" data-review="reviewed">reviewed</button>
        <button class="pill" data-review="unreviewed">unreviewed</button>
      </div>
      <div class="group">
        <span class="sep">batch</span>
        <select class="facet-select" id="f-batch"></select>
        <button class="facet-clear" data-clear="batch" title="clear">×</button>
      </div>
      <div class="group">
        <span class="sep">airport</span>
        <input class="facet-input" id="f-airport" type="text" list="d-airport" placeholder="any" autocomplete="off">
        <datalist id="d-airport"></datalist>
        <button class="facet-clear" data-clear="airport" title="clear">×</button>
      </div>
      <div class="group">
        <span class="sep">position</span>
        <select class="facet-select" id="f-position"></select>
        <button class="facet-clear" data-clear="position" title="clear">×</button>
      </div>
      <div class="group">
        <span class="sep">date</span>
        <select class="facet-select" id="f-date"></select>
        <button class="facet-clear" data-clear="date" title="clear">×</button>
      </div>
      <div class="group">
        <span class="sep">labeler</span>
        <input class="facet-input annotator" id="f-annotator" type="text" list="d-annotator" placeholder="any" autocomplete="off">
        <datalist id="d-annotator"></datalist>
        <button class="facet-clear" data-clear="annotator" title="clear">×</button>
      </div>
      <div class="group">
        <span class="sep">reviewer</span>
        <input class="facet-input annotator" id="f-reviewer" type="text" list="d-reviewer" placeholder="any" autocomplete="off">
        <datalist id="d-reviewer"></datalist>
        <button class="facet-clear" data-clear="reviewer" title="clear">×</button>
      </div>
    </div>
  </div>

  <div class="status">
    <span id="status-l"></span>
    <span id="status-r"></span>
  </div>

  <main id="results"></main>

  <footer>built with minisearch · client-side encrypted · no tracking</footer>
</div>

<script type="module">
import MiniSearch from 'https://cdn.jsdelivr.net/npm/minisearch@7.1.0/+esm';

const $ = id => document.getElementById(id);

const lock = $('lock');
const lockForm = $('lock-form');
const lockErr = $('lock-err');
const pwInput = $('pw');
const pwBtn = $('pw-go');

const app = $('app');
const results = $('results');
const q = $('q');
const statusL = $('status-l');
const statusR = $('status-r');

let ms = null;
let allDocs = [];
let meta = null;
let activeFilter = 'all';
let activeReview = 'all';
const facetSel = { airport: '', position: '', date: '', batch: '', annotator: '', reviewer: '' };
let currentResults = null;

const SESSION_KEY = 'atc-search-key-v1';

// ====================== Crypto ======================
async function deriveKey(password, saltBytes, iterations) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey(
    'raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: saltBytes, iterations, hash: 'SHA-256' },
    baseKey, { name: 'AES-GCM', length: 256 }, true, ['decrypt']
  );
}

async function decryptBlob(buffer, cryptoKey) {
  const iv = buffer.slice(0, 12);
  const rest = buffer.slice(12);
  const tag = new Uint8Array(rest.slice(0, 16));
  const ct  = new Uint8Array(rest.slice(16));
  const ciphertextWithTag = new Uint8Array(ct.length + tag.length);
  ciphertextWithTag.set(ct, 0);
  ciphertextWithTag.set(tag, ct.length);
  const plain = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: new Uint8Array(iv) }, cryptoKey, ciphertextWithTag
  );
  return new TextDecoder().decode(plain);
}

function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}
async function exportKey(k) {
  const raw = await crypto.subtle.exportKey('raw', k);
  return btoa(String.fromCharCode(...new Uint8Array(raw)));
}
async function importKey(b64) {
  return crypto.subtle.importKey('raw', b64ToBytes(b64), { name: 'AES-GCM' }, true, ['decrypt']);
}

// ====================== Boot ======================
async function fetchMeta() {
  const r = await fetch('meta.json');
  if (!r.ok) throw new Error('meta.json not found');
  return r.json();
}
async function fetchEncrypted(p) {
  const r = await fetch(p);
  if (!r.ok) throw new Error(`${p} not found`);
  return r.arrayBuffer();
}

async function tryUnlockFromSession() {
  const cached = sessionStorage.getItem(SESSION_KEY);
  if (!cached) return false;
  try {
    await loadEncryptedData(await importKey(cached));
    return true;
  } catch {
    sessionStorage.removeItem(SESSION_KEY);
    return false;
  }
}

async function attemptUnlock(password) {
  if (!meta) meta = await fetchMeta();
  const key = await deriveKey(password, b64ToBytes(meta.kdf.salt), meta.kdf.iterations);
  await loadEncryptedData(key);
  sessionStorage.setItem(SESSION_KEY, await exportKey(key));
}

async function loadEncryptedData(cryptoKey) {
  if (!meta) meta = await fetchMeta();
  const [dataBuf, indexBuf] = await Promise.all([
    fetchEncrypted('data.enc'), fetchEncrypted('index.enc'),
  ]);
  const [dataJson, indexJson] = await Promise.all([
    decryptBlob(dataBuf, cryptoKey), decryptBlob(indexBuf, cryptoKey),
  ]);
  allDocs = JSON.parse(dataJson);
  ms = MiniSearch.loadJS(JSON.parse(indexJson), {
    fields: ['transcript', 'key', 'drId'],
    storeFields: ['id', 'projectId', 'key', 'duration', 'speakers', 'roles', 'segments', 'transcript',
                  'airport', 'position', 'date', 'time', 'batch', 'snapshotDate', 'annotator',
                  'reviewed', 'reviewedBy', 'reviewedAt', 'drId', 'versions'],
    searchOptions: { boost: { key: 2 }, fuzzy: 0.2, prefix: true },
    tokenize: (text) => text.split(/[\s,.;:!?()[\]{}"<>|/\\-]+/).filter(Boolean),
  });

  showApp();
  populateFacets();
  $('m-docs').textContent = meta.count.toLocaleString();
  $('m-hours').textContent = ((meta.totalSeconds || 0) / 3600).toFixed(1);
  statusL.textContent = `ready · ${meta.count.toLocaleString()} recordings`;
  renderInitial();
}

function showApp() { lock.style.display = 'none'; app.classList.add('unlocked'); q.focus(); }
function showLock(msg) {
  app.classList.remove('unlocked');
  lock.style.display = 'flex';
  pwInput.value = ''; pwInput.focus();
  lockErr.textContent = msg || '';
  pwBtn.disabled = false; pwBtn.textContent = 'unlock';
}

lockForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw = pwInput.value;
  if (!pw) return;
  pwBtn.disabled = true; pwBtn.textContent = 'deriving key…'; lockErr.textContent = '';
  try { await attemptUnlock(pw); }
  catch (err) { console.error(err); showLock('wrong passphrase'); }
});

$('btn-lock').addEventListener('click', () => {
  sessionStorage.removeItem(SESSION_KEY);
  location.reload();
});

// ====================== Facets ======================
function populateFacets() {
  // Dropdowns: batch, position, date
  for (const f of ['batch', 'position', 'date']) {
    const sel = $(`f-${f}`);
    const list = meta.facets[f] || [];
    const total = list.reduce((a, x) => a + x.count, 0);
    sel.innerHTML =
      `<option value="">all (${total.toLocaleString()})</option>` +
      list.map(x => `<option value="${escapeAttr(x.value)}">${escapeHtml(x.value)} (${x.count})</option>`).join('');
    sel.addEventListener('change', () => { facetSel[f] = sel.value; rerun(); });
  }

  // Text inputs with autocomplete: airport, annotator
 // Text inputs with autocomplete: airport, annotator, reviewer
 for (const f of ['airport', 'annotator', 'reviewer']) {
    const input = $(`f-${f}`);
    const dl = $(`d-${f}`);
    const list = meta.facets[f] || [];
    dl.innerHTML = list
      .map(x => `<option value="${escapeAttr(x.value)}">${x.count}</option>`)
      .join('');
    let typeTimer;
    input.addEventListener('input', () => {
      clearTimeout(typeTimer);
      typeTimer = setTimeout(() => {
        facetSel[f] = input.value.trim();
        rerun();
      }, 80);
    });
  }

  // Clear buttons
  document.querySelectorAll('.facet-clear').forEach(btn => {
    btn.addEventListener('click', () => {
      const f = btn.dataset.clear;
      facetSel[f] = '';
      const el = $(`f-${f}`);
      el.value = '';
      rerun();
    });
  });
}

// ====================== Search ======================
function rerun() {
  const query = q.value.trim();
  if (!query) { currentResults = null; renderInitial(); return; }
  doSearch(query);
}
function doSearch(query) {
  if (!ms) return;
  const t0 = performance.now();
  const hits = ms.search(query, { combineWith: 'AND' });
  currentResults = hits;
  render(hits);
  const filteredCount = applyFilters(hits).length;
  statusR.textContent = `${filteredCount.toLocaleString()} of ${hits.length.toLocaleString()} hits · ${(performance.now() - t0).toFixed(1)}ms`;
}

function applyFilters(docs) {
  return docs.filter(d => {
    if (activeFilter !== 'all' && !(d.roles || []).includes(activeFilter)) return false;
    if (activeReview === 'reviewed' && !d.reviewed) return false;
    if (activeReview === 'unreviewed' && d.reviewed) return false;
    if (facetSel.batch && d.batch !== facetSel.batch) return false;
    if (facetSel.airport && d.airport !== facetSel.airport) return false;
    if (facetSel.position && d.position !== facetSel.position) return false;
    if (facetSel.date && d.date !== facetSel.date) return false;
    if (facetSel.annotator && d.annotator !== facetSel.annotator) return false;
    if (facetSel.reviewer && d.reviewedBy !== facetSel.reviewer) return false;
    return true;
  });
}
// ====================== Render ======================
function renderInitial() {
  const filtered = applyFilters(allDocs);
  const slice = filtered.slice(0, 50);
  statusR.textContent = `showing ${slice.length} of ${filtered.length.toLocaleString()}`;
  if (!slice.length) {
    results.innerHTML = `<div class="empty"><div class="glyph">∅</div>nothing matches the current filters</div>`;
    return;
  }
  results.innerHTML = slice.map(d => renderDoc(d, [])).join('');
}

function render(hits) {
  const filtered = applyFilters(hits);
  if (!filtered.length) {
    results.innerHTML = `<div class="empty"><div class="glyph">∅</div>no transcripts matched.</div>`;
    return;
  }
  results.innerHTML = filtered.slice(0, 200).map(h => renderDoc(h, h.terms || [])).join('');
}

function renderDoc(d, terms) {
  const dur = d.duration ? `${d.duration.toFixed(1)}s` : '—';
  const roleTags = (d.roles || []).map(r => `<span class="tag tag-role ${r}">${escapeHtml(r)}</span>`).join('');
  const facetTags = ['airport', 'position', 'date'].map(f =>
    d[f] ? `<span class="tag tag-facet">${escapeHtml(d[f])}</span>` : ''
  ).join('');
  const batchTag = d.batch ? `<span class="tag tag-batch">${escapeHtml(d.batch)}</span>` : '';
  const reviewedAtFmt = d.reviewedAt ? new Date(d.reviewedAt).toISOString().slice(0, 10) : '';
  const reviewTag = d.reviewed
    ? `<span class="tag tag-reviewed" title="reviewed by ${escapeAttr(d.reviewedBy || '?')}${reviewedAtFmt ? ' on ' + reviewedAtFmt : ''}">✓ reviewed</span>`
    : `<span class="tag tag-unreviewed">unreviewed</span>`;
  const versions = d.versions || [];
  const vBadge = versions.length > 0 && !versions[0].reviewed
    ? `<button class="version-badge" data-vid="${escapeAttr(String(d.id))}">&#x1F4DC; ${versions.length}</button>`
    : '';
  const segs = (d.segments || []).map(s => `
    <div class="seg">
      <span class="seg-time">${formatMs(s.start)}</span>
      <span class="seg-role ${s.role || 'unknown'}">${escapeHtml(s.role || '?')}</span>
      <span class="seg-text">${highlight(s.text, terms)}</span>
    </div>
  `).join('');
  const reviewedAtShort = d.reviewedAt ? new Date(d.reviewedAt).toISOString().slice(0, 10) : '';
  const annotatorLine = d.annotator ? `<div class="annotator-line">labeler <b>${escapeHtml(d.annotator)}</b></div>` : '';
  const reviewerLine = d.reviewed && d.reviewedBy ? `<div class="annotator-line">reviewer <b>${escapeHtml(d.reviewedBy)}</b>${reviewedAtShort ? ` <span style="color:var(--ink-faint)">· ${reviewedAtShort}</span>` : ''}</div>` : '';
  // Build Labelbox URL if we have both project + row id. Otherwise fall back
  // to plain text (some rows from older builds may be missing projectId).
  const keyHtml = highlight(d.key, terms);
  const keyEl = (d.projectId && d.id)
    ? `<a class="result-key" href="https://app.labelbox.com/projects/${escapeAttr(d.projectId)}/data-rows/${escapeAttr(d.id)}" target="_blank" rel="noopener noreferrer">${keyHtml}</a>`
    : `<div class="result-key">${keyHtml}</div>`;

  return `
    <article class="result">
      <header class="result-head">
        ${keyEl}
       <div class="result-tags">
          ${vBadge}
          ${reviewTag}
          ${batchTag}
          ${roleTags}
          ${facetTags}
          <span class="tag-dur">${dur}</span>
        </div>
      </header>
<div class="segments">${segs}</div>
      ${annotatorLine}
      ${reviewerLine}
      ${renderHistory(versions, d.id, d)}
    </article>
  `;
}

function versionGlyph(v, prevV) {
  if (v.changeType === 'initial') return '—';
  if (v.changeType === 'content-only') return '⟲';
  const approved = v.reviewed && !(prevV && prevV.reviewed);
  if (approved) return '✓';
  if (v.changeType === 'state-and-content') return '⟲';
  return '·';
}
function versionDesc(v) {
  if (v.changeType === 'initial') return `initial · labeler ${escapeHtml(v.annotator || '?')}`;
  if (v.changeType === 'content-only') return 'transcript revised';
  if (v.changeType === 'state-only') return v.reviewed ? `approved by ${escapeHtml(v.reviewedBy || '?')}` : 'review status changed';
  if (v.changeType === 'state-and-content') return v.reviewed ? `approved · transcript revised` : 'transcript revised · status changed';
  return escapeHtml(v.changeType || '?');
}
function lcsWords(a, b) {
  const m = a.length, n = b.length;
  if (m * n > 60000) return null; // skip diff for very long transcripts
  const dp = Array.from({ length: m + 1 }, () => new Uint16Array(n + 1));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
  return dp;
}
const normWord = w => w.replace(/^[^a-zA-Z0-9]+|[^a-zA-Z0-9]+$/g, '');
// Character-level LCS diff between two words — highlights only the changed chars.
function charDiff(oldW, newW) {
  const oc = [...oldW], nc = [...newW];
  const m = oc.length, n = nc.length;
  if (m * n > 2000) return `<mark class="diff-del">${escapeHtml(oldW)}</mark>`;
  const dp = Array.from({length: m + 1}, () => new Uint8Array(n + 1));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = oc[i-1] === nc[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
  const matched = new Set();
  let i = m, j = n;
  while (i > 0 && j > 0) {
    if (oc[i-1] === nc[j-1]) { matched.add(i-1); i--; j--; }
    else if (dp[i-1][j] >= dp[i][j-1]) i--;
    else j--;
  }
  // Group consecutive deleted chars into one <mark> to avoid per-char padding artifacts
  let html = '', inMark = false;
  for (let k = 0; k < oc.length; k++) {
    const del = !matched.has(k);
    if (del && !inMark)  { html += '<mark class="diff-del">'; inMark = true; }
    if (!del && inMark)  { html += '</mark>'; inMark = false; }
    html += escapeHtml(oc[k]);
  }
  if (inMark) html += '</mark>';
  return html;
}
function wordDiff(oldText, newText) {
  const ow = (oldText || '').split(/\s+/).filter(Boolean);
  const nw = (newText || '').split(/\s+/).filter(Boolean);
  if (!ow.length) return { html: '', pct: null };
  if (!nw.length) return { html: ow.map(w => `<mark class="diff-del">${escapeHtml(w)}</mark>`).join(' '), pct: 100 };
  const on = ow.map(normWord);
  const nn = nw.map(normWord);
  const dp = lcsWords(on, nn);
  if (!dp) return { html: escapeHtml(oldText), pct: null };
  const lcsLen = dp[on.length][nn.length];
  const pct = Math.round((on.length - lcsLen) / on.length * 100);
  // Backtrack — track which new words were matched too
  const matchedOld = new Set();
  const newMatched = new Array(nw.length).fill(false);
  let i = on.length, j = nn.length;
  while (i > 0 && j > 0) {
    if (on[i-1] === nn[j-1]) { matchedOld.add(i-1); newMatched[j-1] = true; i--; j--; }
    else if (dp[i-1][j] >= dp[i][j-1]) i--;
    else j--;
  }
  // Pair unmatched old words with unmatched new words (in order) for char-level diff.
  // Extra old words with no new counterpart are shown as whole-word deletions.
  const unmatchedNew = nw.filter((_, k) => !newMatched[k]);
  let ni = 0;
  return {
    html: ow.map((w, idx) => {
      if (matchedOld.has(idx)) return escapeHtml(w);
      return ni < unmatchedNew.length ? charDiff(w, unmatchedNew[ni++]) : `<mark class="diff-del">${escapeHtml(w)}</mark>`;
    }).join(' '),
    pct,
  };
}
function renderVersionSegs(segments, currentSegments) {
  if (!segments || !segments.length) return '';
  const curByStart = new Map((currentSegments || []).map(s => [s.start, s]));
  return `<div class="segments">${segments.map(s => {
    const cur = curByStart.get(s.start);
    const textHtml = cur ? wordDiff(s.text, cur.text).html : escapeHtml(s.text);
    return `<div class="seg"><span class="seg-time">${formatMs(s.start)}</span><span class="seg-role ${s.role || 'unknown'}">${escapeHtml(s.role || '?')}</span><span class="seg-text">${textHtml}</span></div>`;
  }).join('')}</div>`;
}
function renderHistory(versions, id, d) {
  if (!versions || !versions.length) return '';
  const rev = [...versions].reverse();
  const currentDesc = d.reviewed
    ? `approved by ${escapeHtml(d.reviewedBy || '?')}`
    : `labeler ${escapeHtml(d.annotator || '?')}`;
  const currentBlock = `<div class="version-block current"><div class="version-block-header"><span class="version-block-date">${escapeHtml(d.snapshotDate || '—')}</span><span class="version-block-glyph">↑</span><span class="version-block-desc">${currentDesc}</span></div></div>`;
  const priorBlocks = rev.map((v, i) => {
    let desc = versionDesc(v);
    if (v.changeType !== 'state-only' && (v.changeType !== 'initial' || !v.reviewed)) {
      const { pct } = wordDiff(v.transcript || '', d.transcript || '');
      if (pct !== null) desc += ` · <span style="color:var(--red);opacity:0.75">${pct}% changed</span>`;
    }
    const segs = v.changeType !== 'state-only' ? renderVersionSegs(v.segments, d.segments) : '';
    return `<div class="version-block prior"><div class="version-block-header"><span class="version-block-date">${escapeHtml(v.snapshotDate || '—')}</span><span class="version-block-glyph">${versionGlyph(v, rev[i + 1])}</span><span class="version-block-desc">${desc}</span></div>${segs}</div>`;
  }).join('');
  return `<div class="history-panel" id="hp-${escapeAttr(String(id))}">${currentBlock}${priorBlocks}</div>`;
}

function formatMs(ms) { return ms == null ? '' : (ms / 1000).toFixed(2) + 's'; }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }
function highlight(text, terms) {
  const safe = escapeHtml(text || '');
  if (!terms || !terms.length) return safe;
  const pattern = terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).filter(Boolean).join('|');
  if (!pattern) return safe;
  try { return safe.replace(new RegExp(`(${pattern})`, 'gi'), '<mark>$1</mark>'); }
  catch { return safe; }
}

// ====================== Wire up ======================
let debounceTimer;
q.addEventListener('input', e => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => rerun(), 80);
});
results.addEventListener('click', e => {
  const badge = e.target.closest('.version-badge');
  if (!badge) return;
  const panel = document.getElementById(`hp-${badge.dataset.vid}`);
  if (!panel) return;
  panel.classList.toggle('open');
  badge.classList.toggle('open');
});
document.querySelectorAll('.pill[data-review]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pill[data-review]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeReview = btn.dataset.review;
    rerun();
  });
});
(async function main() {
  try { meta = await fetchMeta(); }
  catch { showLock('couldn\u2019t load meta.json (have you built yet?)'); return; }
  const ok = await tryUnlockFromSession();
  if (!ok) showLock('');
})();
</script>
</body>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>lazydetective</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Fraunces:opsz,wght@9..144,300;9..144,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0b0e0c;
    --panel:     #141a17;
    --line:      #1f2a23;
    --line-2:    #2a3a30;
    --ink:       #d6e3da;
    --ink-dim:   #7a8a80;
    --ink-faint: #4b574f;
    --amber:     #ffb347;
    --red:       #e57373;
    --green:     #66bb6a;
    --pilot:     #6fcf97;
    --atc:       #ffb347;
    --hl-bg:     #3d2a07;
    --hl-fg:     #ffd084;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 16px;
    line-height: 1.55;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at top, rgba(255,179,71,0.04), transparent 60%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
  }

  /* Upload screen */
  .upload-view { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .upload-card { width: 100%; max-width: 480px; border: 1px solid var(--line-2); background: var(--panel); padding: 36px 32px; transition: all 0.15s; position: relative; }
  .upload-title { font-family: 'Fraunces', serif; font-weight: 300; font-size: 23px; margin: 0 0 6px; }
  .upload-title em { font-style: italic; color: var(--amber); font-weight: 600; }
  .upload-sub { color: var(--ink-dim); font-size: 13px; text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 24px; }
  .upload-form { display: flex; flex-direction: column; gap: 20px; }
  .file-input-group { display: flex; flex-direction: column; gap: 8px; }
  .file-input-group label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-faint); }
  .file-input-group input { background: var(--bg); border: 1px solid var(--line-2); color: var(--ink); font-family: inherit; font-size: 14px; padding: 10px; outline: none; width: 100%; }
  .file-input-group input::file-selector-button { background: var(--line-2); color: var(--ink); border: none; padding: 6px 10px; margin-right: 12px; cursor: pointer; font-family: inherit; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; }
  .file-input-group input::file-selector-button:hover { background: var(--ink-faint); }
  .upload-btn { background: var(--amber); color: var(--bg); border: 1px solid var(--amber); font-family: inherit; font-size: 13px; text-transform: uppercase; letter-spacing: 0.16em; padding: 14px; cursor: pointer; font-weight: 700; margin-top: 10px; }
  .upload-btn:disabled { opacity: 0.5; cursor: progress; }
  .upload-status { font-size: 13px; color: var(--ink-dim); min-height: 1.5em; text-align: center; }

  /* Drag and Drop */
  .upload-card.drag-over { border-color: var(--amber); box-shadow: 0 0 0 1px var(--amber); background: rgba(255,179,71,0.05); }

  /* App */
  .app { display: none; }
  .app.unlocked { display: block; }
  header { border-bottom: 1px solid var(--line); padding: 28px 32px 22px; display: flex; align-items: baseline; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  h1 { font-family: 'Fraunces', serif; font-weight: 300; font-size: 29px; margin: 0; letter-spacing: -0.01em; }
  h1 em { font-style: italic; color: var(--amber); font-weight: 600; }
  .meta { display: flex; gap: 16px; font-size: 13px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.12em; align-items: center; }
  .meta b { color: var(--ink); font-weight: 500; letter-spacing: 0; text-transform: none; }
  .meta-link { color: var(--ink-dim); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.15s, color 0.15s; cursor: pointer; }
  .meta-link:hover { color: var(--amber); border-color: var(--amber); }

  .version-badge { font-size: 11px; color: var(--ink-dim); cursor: pointer; border: 1px solid var(--line-2); padding: 4px 10px; user-select: none; transition: color 0.15s, border-color 0.15s; background: transparent; font-family: inherit; }
  .version-badge:hover { color: var(--amber); border-color: rgba(255,179,71,0.4); }
  .version-badge.open { color: var(--amber); border-color: rgba(255,179,71,0.4); }

  .status { padding: 10px 32px; font-size: 13px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.14em; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; gap: 12px; }

  main { padding: 8px 0 80px; }
  .result { border-bottom: 1px solid var(--line); padding: 18px 32px; transition: background 0.1s; }
  .result:hover { background: rgba(255,179,71,0.025); }
  .result-head { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; margin-bottom: 10px; flex-wrap: wrap; }
  .result-key { color: var(--ink); font-size: 13px; font-weight: 500; word-break: break-all; }
  a.result-key { text-decoration: none; }
  a.result-key:hover { color: var(--amber); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; }
  .result-tags { display: flex; gap: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-faint); align-items: center; flex-wrap: wrap; }
  .tag { padding: 2px 8px; border: 1px solid var(--line-2); }
  .tag-role.pilot { color: var(--pilot); border-color: rgba(111,207,151,0.3); }
  .tag-role.atc   { color: var(--atc); border-color: rgba(255,179,71,0.3); }
  .tag-facet { color: var(--ink-dim); }
  .tag-batch { color: var(--amber); border-color: rgba(255,179,71,0.4); }
  .tag-dur { color: var(--ink-dim); border: none; padding-left: 4px; }
  .tag-reviewed { color: var(--pilot); border-color: rgba(111,207,151,0.4); cursor: help; }
  .tag-unapproved { color: var(--red); border-color: rgba(229,115,115,0.4); opacity: 0.8; }
  .tag-missing-history { color: var(--amber); border-color: rgba(255,179,71,0.4); opacity: 0.8; }
  .segments { display: grid; gap: 4px; margin-top: 8px; }

  .seg { display: grid; grid-template-columns: 56px auto 1fr; gap: 12px; align-items: baseline; padding: 4px 0; }
  .seg-time { color: var(--ink-faint); font-size: 13px; font-variant-numeric: tabular-nums; }
  .seg-role { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; white-space: nowrap; padding-right: 4px; }
  .seg-role.pilot { color: var(--pilot); }
  .seg-role.atc { color: var(--atc); }
  .seg-role.unknown { color: var(--ink-faint); }
  .seg-text { color: var(--ink); }
  mark.diff-del { background: transparent; color: var(--red); text-decoration: line-through; border-radius: 0; padding: 0; font-style: normal; }
  mark.diff-add { background: rgba(102,187,106,0.25); color: var(--green); border-radius: 1px; padding: 0; font-style: normal; }
  .seg.seg-removed { border-left: 2px solid var(--red); padding-left: 6px; opacity: 0.8; }
  .seg.seg-added   { border-left: 2px solid var(--green); padding-left: 6px; opacity: 0.8; }

  .annotator-line { font-size: 11px; color: var(--ink-faint); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.12em; }
  .annotator-line b { color: var(--ink-dim); font-weight: 400; text-transform: none; letter-spacing: 0; }
  .copy-id {
    font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px;
    color: var(--ink-dim); cursor: pointer; user-select: all;
    border: 1px solid var(--line-2); padding: 1px 6px;
    text-transform: none; letter-spacing: 0;
    transition: color 0.15s, border-color 0.15s;
  }
  .copy-id:hover { color: var(--amber); border-color: rgba(255,179,71,0.4); }
  .copy-id.copied { color: var(--pilot); border-color: rgba(111,207,151,0.4); }
  .copy-key {
    flex-shrink: 0; user-select: none; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; padding: 0; border: 1px solid transparent;
    color: var(--ink-faint); background: transparent;
    vertical-align: middle;
    transition: color 0.15s, border-color 0.15s;
  }
  .copy-key svg { width: 12px; height: 12px; display: block; }
  .copy-key:hover { color: var(--amber); border-color: rgba(255,179,71,0.4); }
  .copy-key.copied { color: var(--pilot); border-color: rgba(111,207,151,0.4); }
  .result-key-inner { flex: 1; min-width: 0; }
  .result-key-inner .result-key { display: inline; flex: none; }

  .history-panel { display: none; margin-top: 10px; border-left: 2px solid var(--line-2); padding-left: 14px; }
  .history-panel.open { display: block; }
  .version-block { padding: 6px 0 8px; }
  .version-block-header { display: flex; gap: 10px; align-items: baseline; font-size: 13px; margin-bottom: 5px; }
  .version-block-date { color: var(--ink-faint); font-variant-numeric: tabular-nums; min-width: 100px; }
  .version-block-glyph { color: var(--amber); min-width: 16px; text-align: center; }
  .version-block-desc { color: var(--ink-dim); }
  .version-block.prior { background: rgba(229,115,115,0.05); padding: 8px 10px; border-radius: 2px; margin: 4px -4px; }

  .diff-aligned { display: inline-flex; flex-wrap: wrap; column-gap: 0.35em; row-gap: 12px; align-items: center; }
  .da-col { display: inline-flex; flex-direction: column; }
  .da-col > span, .da-eq { display: block; min-height: 1.55em; white-space: nowrap; }
  .da-eq  { color: var(--ink-faint); }
  .da-del { color: var(--red); text-decoration: line-through; }
  .da-ins { color: var(--green); }
  .time-diff { display: flex; flex-direction: column; gap: 1px; }

  .empty { padding: 80px 32px; text-align: center; color: var(--ink-faint); }
  .empty .glyph { font-family: 'Fraunces', serif; font-size: 65px; font-style: italic; color: var(--line-2); margin-bottom: 12px; }

  /* Selection */
  .result-key-wrap { display: flex; gap: 10px; align-items: center; flex: 1; min-width: 0; }
  .result-key-wrap .result-key { flex: 1; min-width: 0; }
  .select-cb {
    appearance: none; -webkit-appearance: none;
    width: 14px; height: 14px; border: 1px solid var(--line-2);
    background: var(--panel); cursor: pointer; position: relative; flex-shrink: 0;
    transition: border-color 0.15s, background 0.15s;
  }
  .select-cb:hover { border-color: var(--amber); }
  .select-cb:checked { background: var(--amber); border-color: var(--amber); }
  .select-cb:checked::after {
    content: ''; position: absolute; left: 3px; top: 0;
    width: 4px; height: 8px; border: solid var(--bg);
    border-width: 0 2px 2px 0; transform: rotate(45deg);
  }
  .selection-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--panel); border-top: 1px solid var(--amber);
    padding: 12px 32px; display: none;
    align-items: center; justify-content: space-between; gap: 16px;
    z-index: 20; box-shadow: 0 -8px 24px rgba(0,0,0,0.4);
  }
  .selection-bar.visible { display: flex; }
  .selection-bar-count { font-size: 13px; color: var(--amber); text-transform: uppercase; letter-spacing: 0.14em; }
  .selection-bar-count b { color: var(--amber); font-weight: 700; }
  .selection-bar-actions { display: flex; gap: 10px; }
  .sel-btn {
    background: transparent; border: 1px solid var(--line-2); color: var(--ink-dim);
    font-family: inherit; font-size: 13px; text-transform: uppercase; letter-spacing: 0.14em;
    padding: 8px 14px; cursor: pointer; transition: all 0.15s;
  }
  .sel-btn:hover { color: var(--amber); border-color: var(--amber); }
  .sel-btn.primary { background: var(--amber); color: var(--bg); border-color: var(--amber); font-weight: 700; }
  .sel-btn.primary:hover { color: var(--bg); opacity: 0.85; }

  footer { border-top: 1px solid var(--line); padding: 16px 32px; font-size: 11px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.16em; text-align: center; }

  @media (max-width: 640px) {
    header, .status, .result, footer { padding-left: 16px; padding-right: 16px; }
    .seg { grid-template-columns: 48px 40px 1fr; gap: 8px; }
    h1 { font-size: 23px; }
  }
  /* Comments */
  .comment-wrap { margin-top: 14px; padding-top: 10px; border-top: 1px dashed var(--line-2); }
  .comment-row { display: flex; gap: 8px; align-items: flex-start; }
  .comment-row .comment-input { flex: 1; width: auto; }
  .comment-input { width: 100%; background: var(--panel); border: 1px solid var(--line-2); color: var(--ink); font-family: inherit; font-size: 13px; padding: 8px 12px; border-radius: 0; outline: none; resize: vertical; min-height: 44px; transition: border-color 0.15s; }
  .comment-input:focus { border-color: var(--amber); box-shadow: 0 0 0 1px var(--amber); }
  .major-btn { flex-shrink: 0; width: 66px; min-height: 44px; background: var(--panel); border: 1px solid var(--line-2); color: var(--ink-dim); font-size: 11px; font-family: inherit; cursor: pointer; transition: all 0.15s; line-height: 1.3; }
  .major-btn:hover { border-color: #c0392b; color: #c0392b; }
  .major-btn.active { background: rgba(192,57,43,0.12); border-color: #c0392b; color: #c0392b; font-weight: 600; }
  .comment-images { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .pasted-img-wrap { position: relative; width: 120px; height: 80px; border: 1px solid var(--line-2); background: var(--bg); }
  .pasted-img-wrap img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }
  .pasted-img-wrap .remove-img, .pasted-img-wrap .remove-img-gen { position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; background: var(--red); color: white; border: none; border-radius: 50%; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; font-weight: bold; }
  .pasted-img-wrap .remove-img:hover, .pasted-img-wrap .remove-img-gen:hover { filter: brightness(1.2); }

  /* Pagination */
  .pagination { display: flex; justify-content: center; align-items: center; gap: 16px; padding: 24px 32px; border-top: 1px solid var(--line); }
  .page-btn { background: var(--panel); border: 1px solid var(--line-2); color: var(--ink-dim); padding: 8px 16px; cursor: pointer; font-family: inherit; font-size: 13px; text-transform: uppercase; letter-spacing: 0.14em; transition: all 0.15s; }
  .page-btn:hover:not(:disabled) { border-color: var(--amber); color: var(--amber); }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .page-info { font-size: 13px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.14em; }
  /* PDF Modal */
  .pdf-modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.85); align-items: center; justify-content: center;
  }
  .pdf-modal-overlay.open { display: flex; }
  .pdf-modal {
    width: min(92vw, 1000px); height: min(90vh, 860px);
    background: var(--panel); border: 1px solid var(--line-2);
    display: flex; flex-direction: column;
  }
  .pdf-modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid var(--line);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-dim);
  }
  .pdf-modal-close {
    background: transparent; border: 1px solid var(--line-2); color: var(--ink-dim);
    font-family: inherit; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
    padding: 5px 12px; cursor: pointer; transition: all 0.15s;
  }
  .pdf-modal-close:hover { color: var(--amber); border-color: var(--amber); }
  .pdf-modal iframe { flex: 1; border: none; background: #fff; }

  @media print {
    .upload-view, .selection-bar, header, .status, .pagination, footer, .comment-wrap, .version-badge { display: none !important; }
    body { background: white; color: black; background-image: none; }
    .app { display: block !important; }
    main { padding-bottom: 0; }
    .result { border-bottom: 1px solid #ddd; page-break-inside: avoid; break-inside: avoid; }
    .result:hover { background: none; }
    .seg-text { color: black; }
    .seg-time, .annotator-line { color: #666; }
    .copy-id { border-color: #ddd; }
  }

  /* PDF Export Styles */
  @page { size: landscape; margin: 0.45in; }
  .export-body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; color: #111; font-size: 10pt; line-height: 1.4; margin: 0; padding: 0; }
  .export-h1 { font-size: 15pt; margin: 0 0 3pt; font-weight: 600; font-family: 'Fraunces', serif; }
  .export-meta { font-size: 8.5pt; color: #666; margin-bottom: 12pt; padding-bottom: 7pt; border-bottom: 1px solid #ccc; text-transform: uppercase; letter-spacing: 0.1em; }
  .export-row { page-break-inside: avoid; break-inside: avoid; margin-bottom: 12pt; padding-bottom: 10pt; border-bottom: 1px solid #e0e0e0; }
  .export-row:last-child { border-bottom: none; }
  .export-key { font-family: 'JetBrains Mono', monospace; font-size: 10.5pt; font-weight: 600; word-break: break-all; margin-bottom: 2pt; }
  a.export-key { color: #0055aa; text-decoration: underline; display: block; }
  .export-tags { font-size: 8.5pt; color: #555; margin-bottom: 5pt; display: flex; gap: 10pt; flex-wrap: wrap; }
  .export-tag { display: inline-block; }
  .export-tag.reviewed { color: #2a7a3a; font-weight: 600; }
  .export-tag.unapproved { color: #999; }
  .export-tag.major { color: #c0392b; font-weight: 600; }
  .export-stats { font-size: 9pt; color: #555; margin-bottom: 14pt; display: flex; gap: 16pt; }
  .export-stats-major { color: #c0392b; font-weight: 600; }
  .export-segs { margin: 4pt 0; display: block; }
  .export-seg { display: grid; grid-template-columns: 40pt auto 1fr; gap: 4pt; align-items: start; margin-bottom: 1.5pt; }
  .export-seg-time { color: #999; font-family: 'JetBrains Mono', monospace; font-size: 8.5pt; }
  .export-seg-role { font-size: 8.5pt; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
  .export-seg-role.pilot { color: #2a7a3a; }
  .export-seg-role.atc { color: #b86b00; }
  .export-seg-text { color: #111; overflow-wrap: break-word; word-break: break-word; line-height: 1.35; }
  .export-versions-h { font-size: 8.5pt; font-weight: 700; margin: 8pt 0 3pt; color: #555; text-transform: uppercase; letter-spacing: 0.06em; }
  .export-ver { border-left: 2pt solid #ddd; padding: 3pt 0 3pt 9pt; margin: 4pt 0; page-break-inside: avoid; break-inside: avoid; }
  .export-ver-h { font-size: 8.5pt; color: #666; margin-bottom: 3pt; }
  .export-ver-h b { color: #111; font-weight: 600; }
  .export-comment { background: #fdfaf5; border-left: 2pt solid #ffb347; padding: 5pt 9pt; margin-top: 6pt; font-size: 9.5pt; color: #333; }
  .export-comment-imgs { display: flex; flex-wrap: wrap; gap: 8pt; margin-top: 7pt; }
  .export-comment-img { max-width: 100%; height: auto; border: 1px solid #ccc; max-height: 3in; object-fit: contain; }
</style>
</head>
<body>


<div class="pdf-modal-overlay" id="pdf-modal-overlay">
  <div class="pdf-modal">
    <div class="pdf-modal-header">
      <span>Instructions</span>
      <button class="pdf-modal-close" id="pdf-modal-close">Close</button>
    </div>
    <iframe src="Lazy Detective Instructions.pdf" title="Instructions"></iframe>
  </div>
</div>

<div class="upload-view" id="upload-view">
  <div class="upload-card">
    <img src="favicon.svg" alt="" style="position: absolute; top: 20px; left: 24px; width: 56px; height: 56px; opacity: 0.85;">
    <h1 class="upload-title" style="margin-top: 52px;">lazy<em>detective</em></h1>
    <div class="upload-sub">upload one or more snapshots to view</div>
    <div style="margin-bottom: 24px;">
      <button onclick="document.getElementById('pdf-modal-overlay').classList.add('open')" style="color: var(--amber); background: transparent; font-family: inherit; text-decoration: none; font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; border: 1px solid var(--line-2); padding: 10px; display: block; width: 100%; text-align: center; transition: all 0.15s; cursor: pointer;" onmouseover="this.style.borderColor='var(--amber)'" onmouseout="this.style.borderColor='var(--line-2)'">Instructions</button>
    </div>
    <form class="upload-form" id="upload-form">
      <div class="file-input-group">
        <label for="file-inputs">NDJSON Snapshots</label>
        <input type="file" id="file-inputs" accept=".ndjson" multiple required>
      </div>
      <button class="upload-btn" id="upload-go" type="submit">Load Snapshots</button>
      <div class="upload-status" id="upload-status"></div>
    </form>
  </div>
</div>

<div class="app" id="app">
  <header>
    <h1>lazy<em>detective</em></h1>
    <div class="meta">
      <span><b id="m-docs">—</b> recordings</span>
      <select id="view-mode" class="version-badge" style="height: auto;">
        <option value="compare">Comparison</option>
        <option value="snapshot">Single Snapshot</option>
      </select>
      <select id="sort-order" class="version-badge" style="height: auto;">
        <option value="diff" selected>Sort: % Change</option>
        <option value="key">Sort: Key</option>
      </select>
      <select id="snapshot-select" class="version-badge" style="height: auto; display: none;">
      </select>
      <a class="meta-link" onclick="location.reload()">Back</a>
      <a class="meta-link" onclick="document.getElementById('pdf-modal-overlay').classList.add('open')" style="cursor:pointer;">Instructions</a>
    </div>
  </header>

  <div id="view-main">
    <div style="padding: 0 32px 24px;">
      <div style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-faint); margin-bottom: 8px;">General Comments</div>
      <textarea id="general-comment" class="comment-input" style="min-height: 80px;" placeholder="Enter general comments for the export..."></textarea>
      <div class="comment-images" id="general-comment-images"></div>
    </div>
    <div class="status">
      <span style="display:flex; gap:10px; align-items:center;">
        <input type="checkbox" class="select-cb" id="sel-all-cb" title="Select all">
        <span id="status-l"></span>
      </span>
      <span id="status-r"></span>
    </div>

    <main id="results"></main>
    <div class="pagination" id="pagination"></div>

    <div class="selection-bar" id="selection-bar">
      <span class="selection-bar-count"><b id="sel-count">0</b> selected</span>
      <div class="selection-bar-actions">
        <button class="sel-btn" id="sel-clear">clear</button>
        <button class="sel-btn primary" id="sel-export">export pdf</button>
      </div>
    </div>

    <footer>built for atc · client-side processing · <a onclick="document.getElementById('pdf-modal-overlay').classList.add('open')" style="color: inherit; text-decoration: none; cursor: pointer;">instructions</a> · no tracking</footer>
</div>

<script type="module">
const $ = id => document.getElementById(id);

const uploadView = $('upload-view');
const uploadForm = $('upload-form');
const uploadStatus = $('upload-status');
const fileInputs = $('file-inputs');

const app = $('app');
const results = $('results');
const statusL = $('status-l');
const statusR = $('status-r');
const viewMode = $('view-mode');
const snapshotSelect = $('snapshot-select');

let allDocs = [];
let snapshots = []; 
let activeViewMode = 'compare'; 
let activeSnapshot = ''; 

const SELECTION_KEY = 'atc-search-selection-v1';
let selection = new Set();
const MAJOR_KEY = 'atc-search-major-v1';
let majorSet = new Set();
const GENERAL_COMMENTS_KEY = 'atc-search-general-comments-v1';
let generalCommentImages = [];

function loadMajor() {
  try { majorSet = new Set(JSON.parse(localStorage.getItem(MAJOR_KEY) || '[]')); } catch { majorSet = new Set(); }
}
function saveMajor() { localStorage.setItem(MAJOR_KEY, JSON.stringify([...majorSet])); }

const COMMENTS_KEY = 'atc-search-comments-v1';
let commentsMap = new Map();
let currentPage = 1;
const PAGE_SIZE = 50;
let filteredDocs = []; 

function loadComments() {
  try {
    const saved = localStorage.getItem(COMMENTS_KEY);
    if (saved) commentsMap = new Map(JSON.parse(saved));
  } catch { commentsMap = new Map(); }
  try {
    const raw = localStorage.getItem(GENERAL_COMMENTS_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (typeof parsed === 'string') {
        $('general-comment').value = parsed;
        generalCommentImages = [];
      } else {
        $('general-comment').value = parsed.text || '';
        generalCommentImages = parsed.images || [];
      }
    }
    renderGeneralCommentImages();
  } catch {
    const gen = localStorage.getItem(GENERAL_COMMENTS_KEY);
    if (gen) $('general-comment').value = gen;
  }
}
function saveComments() {
  localStorage.setItem(COMMENTS_KEY, JSON.stringify([...commentsMap]));
}
function saveGeneralComment() {
  const data = {
    text: $('general-comment').value,
    images: generalCommentImages
  };
  localStorage.setItem(GENERAL_COMMENTS_KEY, JSON.stringify(data));
}

function renderGeneralCommentImages() {
  const container = $('general-comment-images');
  if (!container) return;
  container.innerHTML = generalCommentImages.map((src, i) => `
    <div class="pasted-img-wrap">
      <img src="${src}" onclick="window.open(this.src)">
      <button class="remove-img-gen" data-idx="${i}">&times;</button>
    </div>
  `).join('');
}

// ====================== Data Processing ======================

const KEY_RE = /^([A-Z0-9]+)-([A-Za-z]+)-([A-Za-z]+-\d+-\d+)-(\d+Z)_/;
function parseKey(key) {
  if (!key) return {};
  const m = String(key).match(KEY_RE);
  if (!m) return { airport: null, position: null, date: null, time: null };
  return { airport: m[1], position: m[2], date: m[3], time: m[4] };
}

const ANNOTATOR_RE = /^usr\.email\.([^@]+)@/;
function parseAnnotator(createdBy) {
  if (!createdBy) return null;
  const m = String(createdBy).match(ANNOTATOR_RE);
  return m ? m[1] : String(createdBy);
}

function parseReview(workflowHistory) {
  if (!Array.isArray(workflowHistory) || workflowHistory.length === 0) {
    return { reviewed: false, reviewedBy: null, reviewedAt: null };
  }
  const approvals = workflowHistory
    .filter(e => e?.action === 'Approve')
    .sort((a, b) => String(b?.created_at).localeCompare(String(a?.created_at)));

  if (approvals.length === 0) {
    return { reviewed: false, reviewedBy: null, reviewedAt: null };
  }
  const latest = approvals[0];
  return {
    reviewed: true,
    reviewedBy: parseAnnotator(latest.created_by) ?? latest.created_by ?? null,
    reviewedAt: latest.created_at ?? null,
  };
}

function maxWorkflowDate(workflowHistory) {
  if (!Array.isArray(workflowHistory)) return null;
  return workflowHistory.map(e => e?.created_at).filter(Boolean).sort().slice(-1)[0] ?? null;
}

function flatten(row, batchName, snapshotDate) {
  const id = row?.data_row?.id;
  const key = row?.data_row?.global_key;
  const audioUrl = row?.data_row?.row_data;
  const duration = row?.media_attributes?.duration ?? null;

  const projects = row?.projects ?? {};
  const projectEntries = Object.entries(projects);
  const projectId = projectEntries[0]?.[0] ?? null;
  const firstProject = projectEntries[0]?.[1];
  const label = firstProject?.labels?.[0];
  const workflowHistory = firstProject?.project_details?.workflow_history ?? [];
  const review = parseReview(workflowHistory);
  const facets = parseKey(key);
  const annotator = parseAnnotator(label?.label_details?.created_by);
  const createdAt = label?.label_details?.created_at ?? null;
  const maxActivityAt = maxWorkflowDate(workflowHistory) ?? createdAt ?? null;

  if (!label) {
    return {
      id, key, duration, audioUrl, projectId, ...facets,
      batch: batchName, snapshotDate, annotator, createdAt, maxActivityAt, ...review,
      speakers: 0, roles: [], segments: [], transcript: '',
    };
  }

  const speakerRoles = {};
  for (const c of label?.annotations?.classifications ?? []) {
    if (c?.value === 'how_many_speakers_are_there') {
      for (const sub of c?.radio_answer?.classifications ?? []) {
        const m = sub?.value?.match(/speaker_(\d+)$/);
        if (!m) continue;
        const speakerLabel = `Speaker ${m[1]}`;
        const role = sub?.radio_answer?.value ?? sub?.radio_answer?.name ?? 'unknown';
        speakerRoles[speakerLabel] = String(role).toLowerCase();
      }
    }
  }

  const segmentsBlock = label?.annotations?.segments ?? {};
  const timestampBlock = label?.annotations?.timestamp ?? {};

  const featureToSpeaker = {};
  for (const tsEntry of Object.values(timestampBlock)) {
    for (const cls of tsEntry?.classifications ?? []) {
      const fid = cls?.feature_id;
      const sp = cls?.name;
      if (fid && sp && !featureToSpeaker[fid]) featureToSpeaker[fid] = sp;
    }
  }

  const featureTextByStart = {};
  for (const [tsKey, tsEntry] of Object.entries(timestampBlock)) {
    const startMs = Number(tsKey);
    for (const cls of tsEntry?.classifications ?? []) {
      const fid = cls?.feature_id;
      const text = cls?.text_answer?.content;
      if (!fid || text == null) continue;
      featureTextByStart[fid] ??= {};
      if (featureTextByStart[fid][startMs] == null) {
        featureTextByStart[fid][startMs] = text;
      }
    }
  }

  const segments = [];
  for (const [fid, ranges] of Object.entries(segmentsBlock)) {
    const speakerLabel = featureToSpeaker[fid] ?? 'Speaker ?';
    const role = speakerRoles[speakerLabel] ?? 'unknown';
    for (const [start, end] of ranges) {
      const texts = featureTextByStart[fid] ?? {};
      let text = texts[start] ?? texts[end];
      if (text == null) {
        const uniq = [...new Set(Object.values(texts))];
        text = uniq[0] ?? '';
      }
      segments.push({ role, start, end, text: String(text).trim() });
    }
  }
  segments.sort((a, b) => a.start - b.start);

  const dedupedSegments = [];
  for (const s of segments) {
    const prev = dedupedSegments[dedupedSegments.length - 1];
    if (prev && prev.text === s.text && prev.role === s.role) continue;
    dedupedSegments.push(s);
  }

  const transcript = dedupedSegments.map(s => s.text).filter(Boolean).join(' \u2022 ');
  const roles = Object.keys(speakerRoles).sort().map(k => speakerRoles[k]);

  return {
    id, key, duration, audioUrl, projectId, ...facets,
    batch: batchName, snapshotDate, annotator, createdAt, maxActivityAt, ...review,
    speakers: roles.length,
    roles, segments: dedupedSegments, transcript,
  };
}

function sameSnapshot(a, b) {
  return (a.transcript || '') === (b.transcript || '') &&
         a.reviewed === b.reviewed &&
         (a.annotator || null) === (b.annotator || null);
}

// ====================== File Handling ======================

async function readNDJSON(file, batchName, snapshotDate) {
  const text = await file.text();
  const lines = text.split('\n');
  const results = [];
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    try {
      const flat = flatten(JSON.parse(line), batchName, snapshotDate);
      if (flat.transcript) results.push(flat);
    } catch (e) {
      console.warn(`Error parsing line ${i + 1} of ${file.name}:`, e);
    }
  }
  return results;
}

async function processSnapshots(files) {
  uploadStatus.textContent = 'Reading files...';
  
  const fileList = [...files];
  // Read all files with a temporary index-based date first
  const rawReads = await Promise.all(fileList.map((file, idx) =>
    readNDJSON(file, file.name, (idx + 1).toString().padStart(2, '0'))
  ));

  // Determine each file's true temporal position from its data timestamps
  // (guards against alphabetical ordering placing "_after" before "_before")
  const fileMaxDates = rawReads.map(rows =>
    rows.reduce((max, row) => (row.maxActivityAt > max ? row.maxActivityAt : max), '')
  );
  const order = fileMaxDates.map((_, i) => i)
    .sort((a, b) => String(fileMaxDates[a]).localeCompare(String(fileMaxDates[b])));

  snapshots = order.map((origIdx, newIdx) => ({
    id: (newIdx + 1).toString().padStart(2, '0'),
    name: fileList[origIdx].name
  }));

  // Rebuild reads with corrected snapshotDates
  const snapshotReads = order.map((origIdx, newIdx) => {
    const newDate = (newIdx + 1).toString().padStart(2, '0');
    return rawReads[origIdx].map(row => ({ ...row, snapshotDate: newDate }));
  });

  uploadStatus.textContent = 'Versioning and indexing...';
  const allOccurrences = snapshotReads.flat();
  const grouped = new Map();
  for (const occ of allOccurrences) {
    if (!occ.id) continue;
    if (!grouped.has(occ.id)) grouped.set(occ.id, []);
    grouped.get(occ.id).push(occ);
  }

  const processedRows = [];
  for (const occurrences of grouped.values()) {
    occurrences.sort((a, b) => String(a.snapshotDate).localeCompare(String(b.snapshotDate)));

    const collapsed = [];
    for (const occ of occurrences) {
      const last = collapsed[collapsed.length - 1];
      if (last && sameSnapshot(last, occ)) {
        collapsed[collapsed.length - 1] = occ;
        continue;
      }
      collapsed.push(occ);
    }

    const primary = collapsed[collapsed.length - 1];
    const versions = collapsed.slice(0, -1);

    const snapshotStates = new Map();
    for (const occ of occurrences) {
      snapshotStates.set(occ.snapshotDate, occ);
    }

    const initial = collapsed[0];
    const { pct } = wordDiff(initial.transcript, primary.transcript);
    processedRows.push({ ...primary, versions, snapshotStates, pct });
  }

  allDocs = processedRows;
  allDocs.sort((a, b) => String(a.key || '').localeCompare(String(b.key || '')));

  showApp();
  populateSnapshotSelect();
  loadComments();
  loadMajor();
  $('m-docs').textContent = allDocs.length.toLocaleString();
  statusL.textContent = `ready · ${allDocs.length.toLocaleString()} recordings`;
  rerun();
}

function populateSnapshotSelect() {
  snapshotSelect.innerHTML = snapshots.map(s => `<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('');
  if (snapshots.length > 0) activeSnapshot = snapshots[0].id;
}

async function handleFiles(files) {
  if (!files.length) return;
  $('upload-go').disabled = true;
  try {
    await processSnapshots(files);
  } catch (err) {
    console.error(err);
    uploadStatus.textContent = 'Error processing files: ' + err.message;
    $('upload-go').disabled = false;
  }
}

uploadForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  handleFiles(fileInputs.files);
});

const uploadCard = document.querySelector('.upload-card');
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(name => {
  uploadView.addEventListener(name, e => { e.preventDefault(); e.stopPropagation(); }, false);
});
['dragenter', 'dragover'].forEach(name => {
  uploadView.addEventListener(name, () => uploadCard.classList.add('drag-over'), false);
});
['dragleave', 'drop'].forEach(name => {
  uploadView.addEventListener(name, () => uploadCard.classList.remove('drag-over'), false);
});
uploadView.addEventListener('drop', e => {
  handleFiles(e.dataTransfer.files);
}, false);

function showApp() { uploadView.style.display = 'none'; app.classList.add('unlocked'); }

viewMode.addEventListener('change', () => {
  activeViewMode = viewMode.value;
  snapshotSelect.style.display = activeViewMode === 'snapshot' ? 'inline-block' : 'none';
  rerun();
});

snapshotSelect.addEventListener('change', () => {
  activeSnapshot = snapshotSelect.value;
  rerun();
});

$('sort-order').addEventListener('change', rerun);

function rerun() {
  currentPage = 1;
  filteredDocs = allDocs.filter(d => {
    if (activeViewMode === 'snapshot') {
      return d.snapshotStates.has(activeSnapshot);
    }
    return true;
  });

  const sort = $('sort-order').value;
  if (sort === 'diff') {
    filteredDocs.sort((a, b) => {
      const getScore = doc => {
        const isMissing = snapshots.length > 1 && doc.snapshotStates.size === 1;
        if (isMissing) return -2;
        if (doc.reviewed && (doc.pct || 0) === 0) return -1;
        return doc.pct || 0;
      };
      const scoreA = getScore(a);
      const scoreB = getScore(b);
      if (scoreA !== scoreB) return scoreB - scoreA;
      return String(a.key || '').localeCompare(String(b.key || ''));
    });
  } else {
    filteredDocs.sort((a, b) => String(a.key || '').localeCompare(String(b.key || '')));
  }

  renderPage();
}

function renderPage() {
  const pag = $('pagination');
  if (!filteredDocs.length) {
    results.innerHTML = `<div class="empty"><div class="glyph">∅</div>no recordings found.</div>`;
    pag.innerHTML = '';
    statusR.textContent = `showing 0 docs`;
    return;
  }

  const totalPages = Math.ceil(filteredDocs.length / PAGE_SIZE);
  if (currentPage > totalPages) currentPage = totalPages;

  const start = (currentPage - 1) * PAGE_SIZE;
  const end = start + PAGE_SIZE;
  const slice = filteredDocs.slice(start, end);

  statusR.textContent = `showing ${start + 1}-${Math.min(end, filteredDocs.length)} of ${filteredDocs.length.toLocaleString()}`;
  results.innerHTML = slice.map(d => renderDoc(d)).join('');
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const pag = $('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }

  pag.innerHTML = `
    <button class="page-btn" id="page-prev" ${currentPage === 1 ? 'disabled' : ''}>Prev</button>
    <span class="page-info">Page ${currentPage} of ${totalPages}</span>
    <button class="page-btn" id="page-next" ${currentPage === totalPages ? 'disabled' : ''}>Next</button>
  `;

  $('page-prev')?.addEventListener('click', () => { currentPage--; renderPage(); window.scrollTo(0, 0); });
  $('page-next')?.addEventListener('click', () => { currentPage++; renderPage(); window.scrollTo(0, 0); });
}

function renderDoc(d) {
  let displayDoc = d;
  let showHistory = activeViewMode === 'compare';

  if (activeViewMode === 'snapshot') {
    displayDoc = d.snapshotStates.get(activeSnapshot);
  }

  const audioUrl = d.audioUrl || displayDoc.audioUrl;
  const audioEl = audioUrl 
    ? `<div style="margin-top: 12px;"><audio controls preload="none" src="${audioUrl}" style="width: 100%; height: 32px; filter: invert(0.9) hue-rotate(180deg) contrast(1.2);"></audio></div>`
    : '';

  const dur = displayDoc.duration ? `${displayDoc.duration.toFixed(1)}s` : '—';
  const isMissingHistory = snapshots.length > 1 && d.snapshotStates.size === 1;
  const missingBadge = isMissingHistory 
    ? `<span class="tag tag-missing-history" title="Only exists in one snapshot">missing history</span>` 
    : '';

  const reviewTag = displayDoc.reviewed
    ? `<span class="tag tag-reviewed">✓ approved</span>`
    : (displayDoc.reviewedBy ? '' : `<span class="tag tag-unapproved">unapproved</span>`);
  
  const vBadge = (showHistory && d.versions.length > 0)
    ? `<button class="version-badge" data-vid="${escapeAttr(String(d.id))}">&#x1F4DC; ${d.versions.length}</button>`
    : '';

  const segs = (displayDoc.segments || []).map(s => `
    <div class="seg">
      <span class="seg-time">${formatMs(s.start)}</span>
      <span class="seg-role ${s.role || 'unknown'}">${escapeHtml(s.role || '?')}</span>
      <span class="seg-text">${renderText(s.text)}</span>
    </div>
  `).join('');

  const metaParts = [];
  if (displayDoc.annotator) metaParts.push(`labeler <span class="copy-id" data-copy="${escapeAttr(displayDoc.annotator)}">${escapeHtml(displayDoc.annotator)}</span>`);
  if (displayDoc.reviewedBy) metaParts.push(`reviewer <span class="copy-id" data-copy="${escapeAttr(displayDoc.reviewedBy)}">${escapeHtml(displayDoc.reviewedBy)}</span>`);
  if (displayDoc.id) metaParts.push(`id <span class="copy-id" data-copy="${escapeAttr(String(displayDoc.id))}">${escapeHtml(String(displayDoc.id))}</span>`);
  const metaLine = metaParts.length ? `<div class="annotator-line">${metaParts.join(' &middot; ')}</div>` : '';
  
  const saved = commentsMap.get(String(d.id)) || { text: '', images: [] };
  const text = typeof saved === 'string' ? saved : (saved.text || '');
  const images = Array.isArray(saved.images) ? saved.images : [];
  const imgsHtml = images.map((src, i) => `
    <div class="pasted-img-wrap">
      <img src="${src}" onclick="window.open(this.src)">
      <button class="remove-img" data-cid="${escapeAttr(String(d.id))}" data-idx="${i}">&times;</button>
    </div>
  `).join('');

  const isMajor = majorSet.has(String(d.id));
  const commentUI = `
    <div class="comment-wrap">
      <div class="comment-row">
        <textarea class="comment-input" data-cid="${escapeAttr(String(d.id))}" placeholder="Add a comment or paste screenshot...">${escapeHtml(text)}</textarea>
        <button class="major-btn${isMajor ? ' active' : ''}" data-mid="${escapeAttr(String(d.id))}">&#9873;<br>Major</button>
      </div>
      <div class="comment-images" id="imgs-${escapeAttr(String(d.id))}">${imgsHtml}</div>
    </div>
  `;

  const keyEl = (displayDoc.projectId && displayDoc.id)
    ? `<a class="result-key" href="https://app.labelbox.com/projects/${escapeAttr(displayDoc.projectId)}/data-rows/${escapeAttr(displayDoc.id)}" target="_blank">${escapeHtml(displayDoc.key)}</a>`
    : `<div class="result-key">${escapeHtml(displayDoc.key)}</div>`;

  const copyKeyEl = displayDoc.key
    ? `<span class="copy-key" data-copy="${escapeAttr(displayDoc.key)}" title="Copy global key" role="button" aria-label="Copy global key"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="9" height="9" rx="1"/><path d="M3 11V3a1 1 0 0 1 1-1h7"/></svg></span>`
    : '';

  const isSel = selection.has(d.id) ? 'checked' : '';
  const cbEl = `<input type="checkbox" class="select-cb" data-sel="${escapeAttr(String(d.id))}" ${isSel}>`;

  return `
    <article class="result" data-docid="${escapeAttr(String(d.id))}">
      <header class="result-head">
        <div class="result-key-wrap">${cbEl}<span class="result-key-inner">${keyEl}${copyKeyEl}</span></div>
       <div class="result-tags">
          ${vBadge}
          ${missingBadge}
          ${reviewTag}
          <span class="tag-dur">${dur}</span>
        </div>
      </header>
      <div class="segments">${segs}</div>
      ${audioEl}
      ${metaLine}
      ${showHistory ? renderHistory(d) : ''}
      ${commentUI}
    </article>
  `;
}

// ====================== Diff Logic ======================

const normWord = w => w.replace(/^[^a-zA-Z0-9]+|[^a-zA-Z0-9]+$/g, '');
function lcsWords(a, b) {
  const m = a.length, n = b.length;
  if (m * n > 60000) return null;
  const dp = Array.from({ length: m + 1 }, () => new Uint16Array(n + 1));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
  return dp;
}

function alignedWordDiff(oldText, newText) {
  const ow = (oldText || '').split(/\s+/).filter(Boolean);
  const nw = (newText || '').split(/\s+/).filter(Boolean);
  if (!ow.length && !nw.length) return [];
  const on = ow.map(normWord), nn = nw.map(normWord);
  const dp = lcsWords(on, nn);
  const slots = [];
  if (!dp) {
    const len = Math.max(ow.length, nw.length);
    for (let i = 0; i < len; i++) {
      if (i < ow.length && i < nw.length) slots.push({ type: 'pair', oldWord: ow[i], newWord: nw[i] });
      else if (i < ow.length) slots.push({ type: 'del', word: ow[i] });
      else slots.push({ type: 'ins', word: nw[i] });
    }
    return slots;
  }
  let i = on.length, j = nn.length;
  const ops = [];
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && on[i-1] === nn[j-1]) { ops.push({ type: 'eq', oi: i-1, ni: j-1 }); i--; j--; }
    else if (j > 0 && (i === 0 || dp[i][j-1] > dp[i-1][j])) { ops.push({ type: 'ins', ni: j-1 }); j--; }
    else { ops.push({ type: 'del', oi: i-1 }); i--; }
  }
  ops.reverse();
  let k = 0;
  while (k < ops.length) {
    if (ops[k].type === 'eq') { slots.push({ type: 'eq', word: ow[ops[k].oi] }); k++; }
    else {
      const dels = [], ins = [];
      while (k < ops.length && ops[k].type !== 'eq') {
        if (ops[k].type === 'del') dels.push(ow[ops[k].oi]); else ins.push(nw[ops[k].ni]);
        k++;
      }
      const minLen = Math.min(dels.length, ins.length);
      for (let pi = 0; pi < minLen; pi++) slots.push({ type: 'pair', oldWord: dels[pi], newWord: ins[pi] });
      for (let di = minLen; di < dels.length; di++) slots.push({ type: 'del', word: dels[di] });
      for (let ii = minLen; ii < ins.length; ii++) slots.push({ type: 'ins', word: ins[ii] });
    }
  }
  return slots;
}

function renderAlignedDiff(slots) {
  if (!slots.some(s => s.type !== 'eq')) return slots.map(s => renderText(s.word)).join(' ');

  const cols = slots.map(sl => {
    if (sl.type === 'eq') {
      return `<span class="da-eq">${renderText(sl.word)}</span>`;
    }
    let top = '', bot = '';
    if (sl.type === 'del') {
      top = `<span class="da-del">${renderText(sl.word)}</span>`;
      bot = `<span></span>`;
    } else if (sl.type === 'ins') {
      top = `<span></span>`;
      bot = `<span class="da-ins">${renderText(sl.word)}</span>`;
    } else {
      top = `<span class="da-del">${renderText(sl.oldWord)}</span>`;
      bot = `<span class="da-ins">${renderText(sl.newWord)}</span>`;
    }
    return `<span class="da-col">${top}${bot}</span>`;
  });

  return `<span class="diff-aligned">${cols.join('')}</span>`;
}

function wordDiff(oldText, newText) {
  const ow = (oldText || '').split(/\s+/).filter(Boolean);
  const nw = (newText || '').split(/\s+/).filter(Boolean);
  if (!ow.length && !nw.length) return { pct: 0 };
  const on = ow.map(normWord), nn = nw.map(normWord);
  const dp = lcsWords(on, nn);
  if (!dp) return { pct: 100 };
  const lcsLen = dp[on.length][nn.length];
  const changed = on.length - lcsLen;
  return { pct: Math.round(changed / on.length * 100) };
}

function matchSegments(oldSegs, newSegs) {
  const matchedNew = new Set();
  const pairs = oldSegs.map(s => {
    // 1. Exact match
    let bestMatch = newSegs.find(ns => !matchedNew.has(ns) && Math.round(ns.start) === Math.round(s.start));
    
    // 2. Fuzzy match within 1s if no exact match
    if (!bestMatch) {
      let bestDist = 1001;
      for (const ns of newSegs) {
        if (matchedNew.has(ns)) continue;
        const dist = Math.abs(ns.start - s.start);
        if (dist < 1000 && dist < bestDist) {
          bestDist = dist;
          bestMatch = ns;
        }
      }
    }

    if (bestMatch) {
      matchedNew.add(bestMatch);
      return { old: s, cur: bestMatch };
    }
    return { old: s, cur: null };
  });
  return { pairs, inserted: newSegs.filter(s => !matchedNew.has(s)) };
}

function renderVersionSegs(segments, currentSegments) {
  const { pairs, inserted } = matchSegments(segments, currentSegments || []);
  const sortedInserted = [...inserted].sort((a,b) => a.start - b.start);
  let ii = 0;
  const parts = [];
  for (const { old: s, cur } of pairs) {
    while (ii < sortedInserted.length && sortedInserted[ii].start < s.start) {
      const n = sortedInserted[ii++];
      parts.push(`<div class="seg seg-added"><span class="seg-time">${formatMs(n.start)}</span><span class="seg-role ${n.role}">${escapeHtml(n.role)}</span><span class="seg-text"><mark class="diff-add">${renderText(n.text)}</mark></span></div>`);
    }
    if (cur) {
      const textHtml = renderAlignedDiff(alignedWordDiff(s.text, cur.text));
      const oldRole = s.role || 'unknown', newRole = cur.role || 'unknown';
      const roleHtml = oldRole !== newRole 
        ? `<span class="seg-role"><mark class="diff-del">${escapeHtml(s.role)}</mark><mark class="diff-add">${escapeHtml(cur.role)}</mark></span>`
        : `<span class="seg-role ${oldRole}">${escapeHtml(s.role)}</span>`;
      const timeHtml = Math.round(s.start) !== Math.round(cur.start)
        ? `<span class="time-diff"><mark class="diff-del">${formatMs(s.start)}</mark><mark class="diff-add">${formatMs(cur.start)}</mark></span>`
        : formatMs(s.start);
      parts.push(`<div class="seg"><span class="seg-time">${timeHtml}</span>${roleHtml}<span class="seg-text">${textHtml}</span></div>`);
    } else {
      parts.push(`<div class="seg seg-removed"><span class="seg-time">${formatMs(s.start)}</span><span class="seg-role ${s.role}">${escapeHtml(s.role)}</span><span class="seg-text"><mark class="diff-del">${renderText(s.text)}</mark></span></div>`);
    }
  }
  while (ii < sortedInserted.length) {
    const n = sortedInserted[ii++];
    parts.push(`<div class="seg seg-added"><span class="seg-time">${formatMs(n.start)}</span><span class="seg-role ${n.role}">${escapeHtml(n.role)}</span><span class="seg-text"><mark class="diff-add">${renderText(n.text)}</mark></span></div>`);
  }
  return `<div class="segments">${parts.join('')}</div>`;
}

function renderHistory(d) {
  if (!d.versions || !d.versions.length) return '';
  const initial = d.versions[0];
  const pct = d.pct || 0;
  const pctHtml = pct > 0 ? ` · <span style="color:var(--red);opacity:0.75">${pct}% changed</span>` : '';
  const segs = renderVersionSegs(initial.segments, d.segments);
  return `<div class="history-panel" id="hp-${escapeAttr(String(d.id))}"><div class="version-block prior"><div class="version-block-header"><span class="version-block-date">${escapeHtml(initial.snapshotDate || '—')}</span><span class="version-block-glyph">⟲</span><span class="version-block-desc">initial state${pctHtml}</span></div>${segs}</div></div>`;
}

function formatMs(ms) { return ms == null ? '' : (ms / 1000).toFixed(2) + 's'; }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }
function renderText(s) {
  const ARROW = `<span style="font-size:18px;">&#10230;</span>`;
  return escapeHtml(s).replace(/--&gt;/g, ARROW).replace(/-&gt;/g, ARROW);
}
// Render comment text for PDF export: escape HTML, swap "->" / "-->" for a sized arrow glyph, preserve newlines
function renderCommentText(s) {
  const ARROW = `<span style="font-size:14px;">&#10230;</span>`;
  return escapeHtml(s)
    .replace(/--&gt;/g, ARROW)
    .replace(/-&gt;/g, ARROW)
    .replace(/\n/g, '<br>');
}

// ====================== Wire up ======================

let commentDebounce;

// General Comment listeners
$('general-comment').addEventListener('input', () => {
  clearTimeout(commentDebounce);
  commentDebounce = setTimeout(saveGeneralComment, 500);
});

$('general-comment').addEventListener('paste', handlePaste);

// Result listeners
results.addEventListener('input', e => {
  if (e.target.classList.contains('comment-input')) {
    const id = e.target.dataset.cid;
    const val = e.target.value;
    const current = commentsMap.get(id) || { text: '', images: [] };
    if (typeof current === 'string') {
      commentsMap.set(id, { text: val, images: [] });
    } else {
      current.text = val;
      commentsMap.set(id, current);
    }
    const final = commentsMap.get(id);
    if (!final.text.trim() && (!final.images || final.images.length === 0)) {
      commentsMap.delete(id);
    }
    clearTimeout(commentDebounce);
    commentDebounce = setTimeout(saveComments, 500);
    if (val.trim() && !selection.has(id)) {
      selection.add(id);
      saveSelection();
      updateSelectionBar();
      const cb = document.querySelector(`.select-cb[data-sel="${CSS.escape(id)}"]`);
      if (cb) cb.checked = true;
    }
  }
});

results.addEventListener('paste', handlePaste);

function handlePaste(e) {
  const input = e.target.closest('.comment-input');
  if (!input) return;

  const items = (e.clipboardData || e.originalEvent.clipboardData).items;
  for (const item of items) {
    if (item.type.indexOf('image') !== -1) {
      const file = item.getAsFile();
      const reader = new FileReader();
      reader.onload = (event) => {
        const dataUrl = event.target.result;
        if (input.id === 'general-comment') {
          generalCommentImages = [...generalCommentImages, dataUrl];
          saveGeneralComment();
          renderGeneralCommentImages();
        } else {
          const id = input.dataset.cid;
          const current = commentsMap.get(id) || { text: '', images: [] };
          if (typeof current === 'string') {
            commentsMap.set(id, { text: current, images: [dataUrl] });
          } else {
            current.images = [...(current.images || []), dataUrl];
            commentsMap.set(id, current);
          }
          saveComments();
          if (!selection.has(id)) {
            selection.add(id);
            saveSelection();
            updateSelectionBar();
            const cb = document.querySelector(`.select-cb[data-sel="${CSS.escape(id)}"]`);
            if (cb) cb.checked = true;
          }
          const container = document.getElementById(`imgs-${id}`);
          if (container) {
            const final = commentsMap.get(id);
            container.innerHTML = final.images.map((src, i) => `
              <div class="pasted-img-wrap">
                <img src="${src}" onclick="window.open(this.src)">
                <button class="remove-img" data-cid="${escapeAttr(id)}" data-idx="${i}">&times;</button>
              </div>
            `).join('');
          }
        }
      };
      reader.readAsDataURL(file);
    }
  }
}

document.addEventListener('click', e => {
  // Major button
  const majorBtn = e.target.closest('.major-btn');
  if (majorBtn) {
    const id = majorBtn.dataset.mid;
    if (majorSet.has(id)) {
      majorSet.delete(id);
      majorBtn.classList.remove('active');
    } else {
      majorSet.add(id);
      majorBtn.classList.add('active');
      if (!selection.has(id)) {
        selection.add(id);
        saveSelection();
        updateSelectionBar();
        const cb = document.querySelector(`.select-cb[data-sel="${CSS.escape(id)}"]`);
        if (cb) cb.checked = true;
      }
    }
    saveMajor();
    return;
  }

  // Remove General Comment Image
  const removeGen = e.target.closest('.remove-img-gen');
  if (removeGen) {
    const idx = parseInt(removeGen.dataset.idx);
    generalCommentImages.splice(idx, 1);
    saveGeneralComment();
    renderGeneralCommentImages();
    return;
  }

  // Remove Row Comment Image
  const removeBtn = e.target.closest('.remove-img');
  if (removeBtn) {
    const id = removeBtn.dataset.cid;
    const idx = parseInt(removeBtn.dataset.idx);
    const current = commentsMap.get(id);
    if (current && current.images) {
      current.images.splice(idx, 1);
      if (!current.text.trim() && current.images.length === 0) {
        commentsMap.delete(id);
      } else {
        commentsMap.set(id, current);
      }
      saveComments();
      const container = document.getElementById(`imgs-${id}`);
      if (container) {
        container.innerHTML = (current.images || []).map((src, i) => `
          <div class="pasted-img-wrap">
            <img src="${src}" onclick="window.open(this.src)">
            <button class="remove-img" data-cid="${escapeAttr(id)}" data-idx="${i}">&times;</button>
          </div>
        `).join('');
      }
    }
    return;
  }

  // History Badge
  const badge = e.target.closest('.version-badge');
  if (badge) {
    const panel = document.getElementById(`hp-${badge.dataset.vid}`);
    if (panel) {
      panel.classList.toggle('open');
      badge.classList.toggle('open');
    }
    return;
  }
  
  // Copy ID / Copy global key icon
  const copy = e.target.closest('.copy-id, .copy-key');
  if (copy) {
    const text = copy.dataset.copy;
    if (text && navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => {
        copy.classList.add('copied');
        if (copy.classList.contains('copy-key')) {
          // Icon button — just flash, don't replace the SVG
          setTimeout(() => copy.classList.remove('copied'), 700);
        } else {
          const orig = copy.textContent;
          copy.textContent = 'copied';
          setTimeout(() => { copy.classList.remove('copied'); copy.textContent = orig; }, 700);
        }
      }).catch(() => {});
    }
  }
});

results.addEventListener('change', e => {
  const cb = e.target.closest('.select-cb');
  if (!cb) return;
  const id = cb.dataset.sel;
  if (cb.checked) selection.add(id); else selection.delete(id);
  saveSelection();
  updateSelectionBar();
});

$('sel-all-cb').addEventListener('change', e => {
  if (e.target.checked) {
    filteredDocs.forEach(d => selection.add(d.id));
    document.querySelectorAll('.select-cb:not(#sel-all-cb)').forEach(cb => cb.checked = true);
  } else {
    selection.clear();
    document.querySelectorAll('.select-cb:not(#sel-all-cb)').forEach(cb => cb.checked = false);
  }
  saveSelection();
  updateSelectionBar();
});

$('sel-clear').addEventListener('click', () => {
  selection.clear(); saveSelection(); updateSelectionBar();
  document.querySelectorAll('.select-cb').forEach(cb => cb.checked = false);
});

$('sel-export').addEventListener('click', exportPdf);

function exportPdf() {
  if (!selection.size) return;
  const docs = allDocs.filter(d => selection.has(d.id));
  docs.sort((a, b) => String(a.key || '').localeCompare(String(b.key || '')));

  const reviewers = [...new Set(docs.map(d => d.reviewedBy).filter(Boolean))];
  const annotators = [...new Set(docs.map(d => d.annotator).filter(Boolean))];
  
  let commonId = '';
  if (annotators.length === 1) {
    commonId = annotators[0];
  } else if (reviewers.length === 1) {
    commonId = reviewers[0];
  }

  if (!commonId) {
    commonId = prompt('Multiple reviewers/labelers found. Enter ID for filename:', 'transcripts') || 'transcripts';
  }

  const today = new Date().toISOString().slice(0, 10);
  const exportTitle = `${commonId} ${today}`;

  const w = window.open('', '_blank');
  if (!w) { alert('popup blocked — allow popups to export'); return; }
  w.document.open();
  w.document.write(buildExportHtml(docs, exportTitle));
  w.document.close();
  w.addEventListener('load', () => setTimeout(() => w.print(), 500));
}

function buildExportHtml(docs, title) {
  const today = new Date().toISOString().slice(0, 10);
  const pcts = docs.filter(d => d.versions && d.versions.length).map(d => wordDiff(d.versions[0].transcript, d.transcript).pct);
  const avgPct = pcts.length ? Math.round(pcts.reduce((a, b) => a + b, 0) / pcts.length) : null;
  const majorCount = docs.filter(d => majorSet.has(String(d.id))).length;
  const statsHtml = (avgPct !== null || majorCount > 0) ? `<div class="export-stats">${avgPct !== null ? `<span>avg. ${avgPct}% changed</span>` : ''}${majorCount > 0 ? `<span class="export-stats-major">${majorCount} major</span>` : ''}</div>` : '';
  const docsHtml = docs.map(d => exportRow(d)).join('');
  const styles = document.querySelector('style').innerHTML;
  const genComment = $('general-comment').value;
  const genCommentHtml = (genComment || generalCommentImages.length) ? `
    <div class="export-comment" style="margin-bottom: 24pt; background: #f0f7f2; border-color: #66bb6a;">
      <b>General Comments:</b><br>
      ${genComment ? renderCommentText(genComment) : ''}
      ${generalCommentImages.length ? `<div class="export-comment-imgs">${generalCommentImages.map(src => `<img class="export-comment-img" src="${src}">`).join('')}</div>` : ''}
    </div>` : '';

  return `<!doctype html><html><head><meta charset="utf-8">
<title>${escapeHtml(title)}</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Fraunces:opsz,wght@9..144,600&display=swap">
<style>${styles}</style>
</head><body class="export-body">
<h1 class="export-h1">ATC Transcript Export</h1>
<div class="export-meta">${docs.length} recording${docs.length === 1 ? '' : 's'} · exported ${today}</div>
${statsHtml}
${genCommentHtml}
${docsHtml}
</body></html>`;
}

function exportRow(d) {
  const dur = d.duration ? `${d.duration.toFixed(1)}s` : '—';
  const facets = ['airport', 'position', 'date', 'time'].filter(f => d[f]).map(f => `<span class="export-tag">${escapeHtml(d[f])}</span>`).join('');

  const review = d.reviewed
    ? `<span class="export-tag reviewed">✓ approved</span>`
    : (d.reviewedBy ? '' : `<span class="export-tag unapproved">unapproved</span>`);

  const labeler = d.annotator ? `<span class="export-tag">labeler: ${escapeHtml(d.annotator)}</span>` : '';
  const reviewer = d.reviewedBy ? `<span class="export-tag">reviewer: ${escapeHtml(d.reviewedBy)}</span>` : '';

  let pctTag = '';
  if (d.versions && d.versions.length) {
    const { pct } = wordDiff(d.versions[0].transcript, d.transcript);
    if (pct > 0) pctTag = `<span>${pct}% changed</span>`;
  }
  const majorTag = majorSet.has(String(d.id)) ? `<span class="export-tag major">&#9873; major</span>` : '';

  const segs = (d.segments || []).map(s => `
    <div class="export-seg">
      <span class="export-seg-time">${formatMs(s.start)}</span>
      <span class="export-seg-role ${s.role || 'unknown'}">${escapeHtml(s.role || '?')}</span>
      <span class="export-seg-text">${renderText(s.text)}</span>
    </div>
  `).join('');

  const showCurrentStandalone = !(d.versions && d.versions.length);
  const segsHtml = showCurrentStandalone ? `<div class="export-segs">${segs}</div>` : '';

  let versionsHtml = '';
  if (d.versions && d.versions.length) {
    versionsHtml = [...d.versions].reverse().map(v => exportVersion(v, d)).join('');
  }

  const saved = commentsMap.get(String(d.id));
  let commentHtml = '';
  if (saved) {
    const text = typeof saved === 'string' ? saved : (saved.text || '');
    const images = Array.isArray(saved.images) ? saved.images : [];
    const textPart = text ? `<div>${renderCommentText(text)}</div>` : '';
    const imgsPart = images.length ? `<div class="export-comment-imgs">${images.map(src => `<img class="export-comment-img" src="${src}">`).join('')}</div>` : '';
    if (textPart || imgsPart) {
      commentHtml = `<div class="export-comment"><b>Note:</b><br>${textPart}${imgsPart}</div>`;
    }
  }

  const keyEl = (d.projectId && d.id)
    ? `<a class="export-key" href="https://app.labelbox.com/projects/${escapeAttr(d.projectId)}/data-rows/${escapeAttr(d.id)}" target="_blank">${escapeHtml(d.key || d.id || '')}</a>`
    : `<div class="export-key">${escapeHtml(d.key || d.id || '')}</div>`;

  return `<div class="export-row">
    ${keyEl}
    <div class="export-tags">${majorTag}${review}${labeler}${reviewer}${facets}<span>${dur}</span>${pctTag}</div>
    ${segsHtml}
    ${versionsHtml}
    ${commentHtml}
  </div>`;
}

function exportVersion(v, d) {
  const segs = renderVersionSegs(v.segments, d.segments);

  const exportSegs = segs
    .replace(/class="seg-time"/g, 'class="export-seg-time"')
    .replace(/class="seg-role (.*?)"/g, 'class="export-seg-role $1"')
    .replace(/class="seg-text"/g, 'class="export-seg-text"')
    .replace(/class="seg"/g, 'class="export-seg"')
    .replace(/class="segments"/g, 'class="export-segs"');

  return `<div class="export-ver">${exportSegs}</div>`;
}

// PDF modal close
document.getElementById('pdf-modal-close').addEventListener('click', () => {
  document.getElementById('pdf-modal-overlay').classList.remove('open');
});
document.getElementById('pdf-modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

function loadSelection() {
  try {
    const saved = localStorage.getItem(SELECTION_KEY);
    if (saved) selection = new Set(JSON.parse(saved));
  } catch { selection = new Set(); }
  updateSelectionBar();
}
function saveSelection() { localStorage.setItem(SELECTION_KEY, JSON.stringify([...selection])); }
function updateSelectionBar() {
  const bar = $('selection-bar');
  $('sel-count').textContent = selection.size;
  bar.classList.toggle('visible', selection.size > 0);
}
</script>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>ATC Transcript Search — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Fraunces:opsz,wght@9..144,300;9..144,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0b0e0c;
    --panel:     #141a17;
    --line:      #1f2a23;
    --line-2:    #2a3a30;
    --ink:       #d6e3da;
    --ink-dim:   #7a8a80;
    --ink-faint: #4b574f;
    --amber:     #ffb347;
    --red:       #e57373;
    --green:     #66bb6a;
    --pilot:     #6fcf97;
    --atc:       #ffb347;
    --hl-bg:     #3d2a07;
    --hl-fg:     #ffd084;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13px;
    line-height: 1.55;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at top, rgba(255,179,71,0.04), transparent 60%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
  }

  header { border-bottom: 1px solid var(--line); padding: 28px 32px 22px; display: flex; align-items: baseline; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  h1 { font-family: 'Fraunces', serif; font-weight: 300; font-size: 28px; margin: 0; letter-spacing: -0.01em; }
  h1 em { font-style: italic; color: var(--amber); font-weight: 600; }
  .meta { display: flex; gap: 24px; font-size: 11px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.12em; align-items: center; }
  .meta b { color: var(--ink); font-weight: 500; letter-spacing: 0; text-transform: none; }
  .preview-badge { color: var(--amber); border: 1px solid rgba(255,179,71,0.4); font-family: inherit; font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; padding: 4px 10px; }

  .search-wrap { padding: 24px 32px 12px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .search-row { display: flex; gap: 12px; align-items: center; }
  .search-input { flex: 1; background: var(--panel); border: 1px solid var(--line-2); color: var(--ink); font-family: inherit; font-size: 15px; padding: 12px 16px; outline: none; border-radius: 0; transition: border-color 0.15s; }
  .search-input::placeholder { color: var(--ink-faint); }
  .search-input:focus { border-color: var(--amber); box-shadow: 0 0 0 1px var(--amber); }

  .pill { border: 1px solid var(--line-2); color: var(--ink-dim); padding: 6px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; cursor: pointer; user-select: none; background: transparent; font-family: inherit; transition: all 0.15s; }
  .pill:hover { color: var(--ink); border-color: var(--ink-dim); }
  .pill.active { color: var(--bg); background: var(--amber); border-color: var(--amber); }

  .filters { display: flex; gap: 14px; margin-top: 14px; align-items: center; flex-wrap: wrap; }
  .filters .group { display: flex; gap: 8px; align-items: center; }
  .filters .sep { color: var(--ink-faint); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; }

  .facet-select {
    background: var(--panel); color: var(--ink); border: 1px solid var(--line-2);
    font-family: inherit; font-size: 12px; padding: 6px 10px;
    border-radius: 0; cursor: pointer; min-width: 110px;
  }
  .facet-select:focus { outline: none; border-color: var(--amber); }

  .status { padding: 10px 32px; font-size: 11px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.14em; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; gap: 12px; }

  main { padding: 8px 0 80px; }
  .result { border-bottom: 1px solid var(--line); padding: 18px 32px; transition: background 0.1s; }
  .result:hover { background: rgba(255,179,71,0.025); }
  .result-head { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; margin-bottom: 10px; flex-wrap: wrap; }
  .result-key { color: var(--ink); font-size: 13px; font-weight: 500; word-break: break-all; }
  a.result-key { text-decoration: none; }
  a.result-key:hover { color: var(--amber); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; }
  .result-tags { display: flex; gap: 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-faint); align-items: center; flex-wrap: wrap; }
  .tag { padding: 2px 8px; border: 1px solid var(--line-2); }
  .tag-role.pilot { color: var(--pilot); border-color: rgba(111,207,151,0.3); }
  .tag-role.atc   { color: var(--atc); border-color: rgba(255,179,71,0.3); }
  .tag-facet { color: var(--ink-dim); }
  .tag-batch { color: var(--amber); border-color: rgba(255,179,71,0.4); }
  .tag-dur { color: var(--ink-dim); border: none; padding-left: 4px; }
  .tag-reviewed { color: var(--pilot); border-color: rgba(111,207,151,0.4); cursor: help; }
  .tag-unreviewed { color: var(--ink-faint); border-color: var(--line-2); }
  .segments { display: grid; gap: 4px; margin-top: 8px; }
  .seg { display: grid; grid-template-columns: 56px 48px 1fr; gap: 12px; align-items: baseline; padding: 4px 0; }
  .seg-time { color: var(--ink-faint); font-size: 11px; font-variant-numeric: tabular-nums; }
  .seg-role { font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; }
  .seg-role.pilot { color: var(--pilot); }
  .seg-role.atc { color: var(--atc); }
  .seg-role.unknown { color: var(--ink-faint); }
  .seg-text { color: var(--ink); }
  .seg-text mark, .result-key mark { background: var(--hl-bg); color: var(--hl-fg); padding: 0 2px; border-radius: 1px; }

  .annotator-line { font-size: 10px; color: var(--ink-faint); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.12em; }
  .annotator-line b { color: var(--ink-dim); font-weight: 400; text-transform: none; letter-spacing: 0; }

  .version-badge { font-size: 10px; color: var(--ink-dim); cursor: pointer; border: 1px solid var(--line-2); padding: 2px 7px; user-select: none; transition: color 0.15s, border-color 0.15s; background: transparent; font-family: inherit; }
  .version-badge:hover { color: var(--amber); border-color: rgba(255,179,71,0.4); }
  .version-badge.open { color: var(--amber); border-color: rgba(255,179,71,0.4); }
  .history-panel { display: none; margin-top: 10px; border-left: 2px solid var(--line-2); padding-left: 14px; }
  .history-panel.open { display: block; }
  .version-block { padding: 6px 0 8px; }
  .version-block + .version-block { border-top: 1px solid var(--line-2); padding-top: 10px; margin-top: 2px; }
  .version-block-header { display: flex; gap: 10px; align-items: baseline; font-size: 11px; margin-bottom: 5px; }
  .version-block-date { color: var(--ink-faint); font-variant-numeric: tabular-nums; min-width: 100px; }
  .version-block-glyph { color: var(--amber); min-width: 16px; text-align: center; }
  .version-block-desc { color: var(--ink-dim); }
  .version-block.current .version-block-date { color: var(--amber); }
  .version-block.current .version-block-desc { color: var(--ink); }
  .version-block.prior { background: rgba(229,115,115,0.05); padding: 8px 10px; border-radius: 2px; margin: 4px -4px; }
  mark.diff-del { background: transparent; color: var(--red); text-decoration: line-through; border-radius: 0; padding: 0; font-style: normal; }
  mark.diff-add { background: rgba(102,187,106,0.25); color: var(--green); border-radius: 1px; padding: 0; font-style: normal; }

  .empty { padding: 80px 32px; text-align: center; color: var(--ink-faint); }
  .empty .glyph { font-family: 'Fraunces', serif; font-size: 64px; font-style: italic; color: var(--line-2); margin-bottom: 12px; }

  footer { border-top: 1px solid var(--line); padding: 16px 32px; font-size: 10px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.16em; text-align: center; }

  @media (max-width: 640px) {
    header, .search-wrap, .status, .result, footer { padding-left: 16px; padding-right: 16px; }
    .seg { grid-template-columns: 48px 40px 1fr; gap: 8px; }
    h1 { font-size: 22px; }
  }
</style>
</head>

// ── Helpers (must precede boot) ───────────────────────────────────────────────
const normWord = w => w.replace(/^[^a-zA-Z0-9]+|[^a-zA-Z0-9]+$/g, '');

// ── State ─────────────────────────────────────────────────────────────────────
let activeFilter  = 'all';
let activeReview  = 'all';
let activeHistory = 'all';
let facetBatch    = '';
let facetPosition = '';

const $ = id => document.getElementById(id);
const results  = $('results');
const statusL  = $('status-l');
const statusR  = $('status-r');
const q        = $('q');

// ── Boot ──────────────────────────────────────────────────────────────────────
const totalDocs  = DOCS.length;
const totalSecs  = DOCS.reduce((a, d) => a + (d.duration || 0), 0);
$('m-docs').textContent  = totalDocs.toLocaleString();
$('m-hours').textContent = (totalSecs / 3600).toFixed(1);
statusL.textContent = `preview · ${totalDocs} placeholder recordings`;
renderAll();

// ── Filters ───────────────────────────────────────────────────────────────────
function applyFilters(docs, query) {
  const terms = query ? query.toLowerCase().split(/\s+/).filter(Boolean) : [];
  return docs.filter(d => {
    if (activeFilter !== 'all' && !(d.roles || []).includes(activeFilter)) return false;
    if (activeReview === 'reviewed'   && !d.reviewed)  return false;
    if (activeReview === 'unreviewed' && d.reviewed)   return false;
    if (activeHistory === 'edited' && !hasRealHistory(d.versions, d)) return false;
    if (facetBatch    && d.batch    !== facetBatch)    return false;
    if (facetPosition && d.position !== facetPosition) return false;
    if (terms.length) {
      const hay = (d.transcript + ' ' + d.key + ' ' + d.airport).toLowerCase();
      if (!terms.every(t => hay.includes(t))) return false;
    }
    return true;
  });
}

function renderAll() {
  const query = q.value.trim();
  const filtered = applyFilters(DOCS, query);
  statusR.textContent = `showing ${filtered.length} of ${totalDocs}`;
  if (!filtered.length) {
    results.innerHTML = `<div class="empty"><div class="glyph">∅</div>nothing matches the current filters</div>`;
    return;
  }
  const terms = query ? query.toLowerCase().split(/\s+/).filter(Boolean) : [];
  results.innerHTML = filtered.map(d => renderDoc(d, terms)).join('');
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function renderDoc(d, terms) {
  const dur = d.duration ? `${d.duration.toFixed(1)}s` : '—';
  const roleTags = (d.roles || []).map(r => `<span class="tag tag-role ${r}">${escapeHtml(r)}</span>`).join('');
  const facetTags = ['airport', 'position', 'date'].map(f =>
    d[f] ? `<span class="tag tag-facet">${escapeHtml(d[f])}</span>` : ''
  ).join('');
  const batchTag = d.batch ? `<span class="tag tag-batch">${escapeHtml(d.batch)}</span>` : '';
  const reviewedAtFmt = d.reviewedAt ? new Date(d.reviewedAt).toISOString().slice(0, 10) : '';
  const reviewTag = d.reviewed
    ? `<span class="tag tag-reviewed" title="reviewed by ${escapeAttr(d.reviewedBy || '?')}${reviewedAtFmt ? ' on ' + reviewedAtFmt : ''}">✓ reviewed</span>`
    : `<span class="tag tag-unreviewed">unreviewed</span>`;
  const versions = d.versions || [];
  const vBadge = hasRealHistory(versions, d)
    ? `<button class="version-badge" data-vid="${escapeAttr(String(d.id))}">&#x1F4DC; ${versions.length}</button>`
    : '';
  const segs = (d.segments || []).map(s => `
    <div class="seg">
      <span class="seg-time">${formatMs(s.start)}</span>
      <span class="seg-role ${s.role || 'unknown'}">${escapeHtml(s.role || '?')}</span>
      <span class="seg-text">${highlight(s.text, terms)}</span>
    </div>
  `).join('');
  const reviewedAtShort = d.reviewedAt ? new Date(d.reviewedAt).toISOString().slice(0, 10) : '';
  const annotatorLine = d.annotator
    ? `<div class="annotator-line">labeler <b>${escapeHtml(d.annotator)}</b></div>` : '';
  const reviewerLine = d.reviewed && d.reviewedBy
    ? `<div class="annotator-line">reviewer <b>${escapeHtml(d.reviewedBy)}</b>${reviewedAtShort ? ` <span style="color:var(--ink-faint)">· ${reviewedAtShort}</span>` : ''}</div>` : '';
  const keyHtml = highlight(d.key, terms);
  return `
    <article class="result">
      <header class="result-head">
        <div class="result-key">${keyHtml}</div>
        <div class="result-tags">
          ${vBadge}
          ${reviewTag}
          ${batchTag}
          ${roleTags}
          ${facetTags}
          <span class="tag-dur">${dur}</span>
        </div>
      </header>
      <div class="segments">${segs}</div>
      ${annotatorLine}
      ${reviewerLine}
      ${renderHistory(versions, d.id, d)}
    </article>
  `;
}

function hasRealHistory(versions, d) {
  if (!versions || !versions.length) return false;
  if (versions.some(v => v.changeType !== 'initial')) return true;
  const first = versions[0];
  return first.reviewed !== d.reviewed || (first.transcript || '') !== (d.transcript || '');
}

function versionGlyph(v, prevV) {
  if (v.changeType === 'initial') return '—';
  if (v.changeType === 'content-only') return '⟲';
  const approved = v.reviewed && !(prevV && prevV.reviewed);
  if (approved) return '✓';
  if (v.changeType === 'state-and-content') return '⟲';
  return '·';
}
function versionDesc(v) {
  if (v.changeType === 'initial') return `initial · labeler ${escapeHtml(v.annotator || '?')}`;
  if (v.changeType === 'content-only') return 'transcript revised';
  if (v.changeType === 'state-only') return v.reviewed ? `approved by ${escapeHtml(v.reviewedBy || '?')}` : 'review status changed';
  if (v.changeType === 'state-and-content') return v.reviewed ? `approved · transcript revised` : 'transcript revised · status changed';
  return escapeHtml(v.changeType || '?');
}

function lcsWords(a, b) {
  const m = a.length, n = b.length;
  if (m * n > 60000) return null;
  const dp = Array.from({ length: m + 1 }, () => new Uint16Array(n + 1));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
  return dp;
}
function charDiff(oldW, newW) {
  const oc = [...oldW], nc = [...newW];
  const m = oc.length, n = nc.length;
  if (m * n > 10000) {
    return `<mark class="diff-del">${escapeHtml(oldW)}</mark><mark class="diff-add">${escapeHtml(newW)}</mark>`;
  }
  const dp = Array.from({length: m + 1}, () => new Uint16Array(n + 1));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = oc[i-1] === nc[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
  const ops = [];
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && oc[i-1] === nc[j-1]) { ops.push({ type: 'eq', c: oc[i-1] }); i--; j--; }
    else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) { ops.push({ type: 'ins', c: nc[j-1] }); j--; }
    else { ops.push({ type: 'del', c: oc[i-1] }); i--; }
  }
  ops.reverse();
  let html = '', cur = 'eq';
  for (const { type, c } of ops) {
    if (type !== cur) {
      if (cur !== 'eq') html += '</mark>';
      if (type !== 'eq') html += `<mark class="diff-${type}">`;
      cur = type;
    }
    html += escapeHtml(c);
  }
  if (cur !== 'eq') html += '</mark>';
  return html;
}
function wordSim(a, b) {
  if (!a.length || !b.length) return 0;
  if (a === b) return 1;
  if (a.toLowerCase() === b.toLowerCase()) return 0.9;
  const m = a.length, n = b.length;
  if (m * n > 10000) return 0;
  let prev = new Uint16Array(n + 1), curr = new Uint16Array(n + 1);
  for (let ii = 1; ii <= m; ii++) {
    for (let jj = 1; jj <= n; jj++)
      curr[jj] = a[ii-1] === b[jj-1] ? prev[jj-1] + 1 : Math.max(prev[jj], curr[jj-1]);
    [prev, curr] = [curr, prev]; curr.fill(0);
  }
  return 2 * prev[n] / (m + n);
}
const SIM_THRESHOLD = 0.35;
function pairDelIns(dels, ins) {
  if (!dels.length) return ins.map(w => `<mark class="diff-add">${escapeHtml(w)}</mark>`);
  if (!ins.length) return dels.map(w => `<mark class="diff-del">${escapeHtml(w)}</mark>`);
  const nd = dels.map(normWord), ni = ins.map(normWord);
  const usedI = new Set();
  const pairMap = new Map();
  for (let di = 0; di < dels.length; di++) {
    let bestJ = -1, bestSim = SIM_THRESHOLD;
    for (let ii = 0; ii < ins.length; ii++) {
      if (usedI.has(ii)) continue;
      const s = wordSim(nd[di], ni[ii]);
      if (s > bestSim) { bestSim = s; bestJ = ii; }
    }
    if (bestJ !== -1) { pairMap.set(di, bestJ); usedI.add(bestJ); }
  }
  const result = [];
  for (let di = 0; di < dels.length; di++) {
    result.push(pairMap.has(di)
      ? charDiff(dels[di], ins[pairMap.get(di)])
      : `<mark class="diff-del">${escapeHtml(dels[di])}</mark>`);
  }
  for (let ii = 0; ii < ins.length; ii++) {
    if (!usedI.has(ii)) result.push(`<mark class="diff-add">${escapeHtml(ins[ii])}</mark>`);
  }
  return result;
}
function wordDiff(oldText, newText) {
  const ow = (oldText || '').split(/\s+/).filter(Boolean);
  const nw = (newText || '').split(/\s+/).filter(Boolean);
  if (!ow.length && !nw.length) return { html: '', pct: null };
  if (!ow.length) return { html: nw.map(w => `<mark class="diff-add">${escapeHtml(w)}</mark>`).join(' '), pct: null };
  if (!nw.length) return { html: ow.map(w => `<mark class="diff-del">${escapeHtml(w)}</mark>`).join(' '), pct: 100 };
  const on = ow.map(normWord);
  const nn = nw.map(normWord);
  const dp = lcsWords(on, nn);
  if (!dp) return { html: escapeHtml(oldText), pct: null };
  const lcsLen = dp[on.length][nn.length];
  const pct = Math.round((on.length - lcsLen) / on.length * 100);
  const ops = [];
  let i = on.length, j = nn.length;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && on[i-1] === nn[j-1]) { ops.push({ type: 'eq', oi: i-1, ni: j-1 }); i--; j--; }
    else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) { ops.push({ type: 'ins', ni: j-1 }); j--; }
    else { ops.push({ type: 'del', oi: i-1 }); i--; }
  }
  ops.reverse();
  const parts = [];
  let k = 0;
  while (k < ops.length) {
    if (ops[k].type === 'eq') { parts.push(escapeHtml(ow[ops[k].oi])); k++; }
    else {
      const dels = [], ins = [];
      while (k < ops.length && ops[k].type !== 'eq') {
        if (ops[k].type === 'del') dels.push(ow[ops[k].oi]);
        else ins.push(nw[ops[k].ni]);
        k++;
      }
      parts.push(...pairDelIns(dels, ins));
    }
  }
  return { html: parts.join(' '), pct };
}
function renderVersionSegs(segments, currentSegments) {
  if (!segments || !segments.length) return '';
  const curByStart = new Map((currentSegments || []).map(s => [Math.round(s.start), s]));
  return `<div class="segments">${segments.map(s => {
    const cur = curByStart.get(Math.round(s.start));
    const textHtml = cur ? wordDiff(s.text, cur.text).html : escapeHtml(s.text);
    return `<div class="seg"><span class="seg-time">${formatMs(s.start)}</span><span class="seg-role ${s.role || 'unknown'}">${escapeHtml(s.role || '?')}</span><span class="seg-text">${textHtml}</span></div>`;
  }).join('')}</div>`;
}
function renderHistory(versions, id, d) {
  if (!versions || !versions.length || !hasRealHistory(versions, d)) return '';
  const rev = [...versions].reverse();
  const currentDesc = d.reviewed
    ? `approved by ${escapeHtml(d.reviewedBy || '?')}`
    : `labeler ${escapeHtml(d.annotator || '?')}`;
  const currentBlock = `<div class="version-block current"><div class="version-block-header"><span class="version-block-date">${escapeHtml(d.snapshotDate || '—')}</span><span class="version-block-glyph">↑</span><span class="version-block-desc">${currentDesc}</span></div></div>`;
  const priorBlocks = rev.map((v, i) => {
    let desc = versionDesc(v);
    if (v.changeType !== 'state-only' && (v.changeType !== 'initial' || !v.reviewed)) {
      const { pct } = wordDiff(v.transcript || '', d.transcript || '');
      if (pct !== null) desc += ` · <span style="color:var(--red);opacity:0.75">${pct}% changed</span>`;
    }
    const segs = v.changeType !== 'state-only' ? renderVersionSegs(v.segments, d.segments) : '';
    return `<div class="version-block prior"><div class="version-block-header"><span class="version-block-date">${escapeHtml(v.snapshotDate || '—')}</span><span class="version-block-glyph">${versionGlyph(v, rev[i + 1])}</span><span class="version-block-desc">${desc}</span></div>${segs}</div>`;
  }).join('');
  return `<div class="history-panel open" id="hp-${escapeAttr(String(id))}">${currentBlock}${priorBlocks}</div>`;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function formatMs(ms) { return ms == null ? '' : (ms / 1000).toFixed(2) + 's'; }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }
function highlight(text, terms) {
  const safe = escapeHtml(text || '');
  if (!terms || !terms.length) return safe;
  const pattern = terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).filter(Boolean).join('|');
  if (!pattern) return safe;
  try { return safe.replace(new RegExp(`(${pattern})`, 'gi'), '<mark>$1</mark>'); }
  catch { return safe; }
}

// ── Event wiring ──────────────────────────────────────────────────────────────
let debounce;
q.addEventListener('input', () => { clearTimeout(debounce); debounce = setTimeout(renderAll, 80); });

document.querySelectorAll('.pill[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pill[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderAll();
  });
});
document.querySelectorAll('.pill[data-review]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pill[data-review]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeReview = btn.dataset.review;
    renderAll();
  });
});
document.querySelectorAll('.pill[data-history]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pill[data-history]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeHistory = btn.dataset.history;
    renderAll();
  });
});
$('f-batch').addEventListener('change', e => { facetBatch = e.target.value; renderAll(); });
$('f-position').addEventListener('change', e => { facetPosition = e.target.value; renderAll(); });

results.addEventListener('click', e => {
  const badge = e.target.closest('.version-badge');
  if (!badge) return;
  const panel = document.getElementById(`hp-${badge.dataset.vid}`);
  if (!panel) return;
  panel.classList.toggle('open');
  badge.classList.toggle('open');
});
